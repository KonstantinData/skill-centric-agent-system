name = "daskuechenhaus-control-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "daskuechenhaus-cases"
# Run: wrangler d1 create daskuechenhaus-cases
# Then replace the placeholder below with the returned database_id.
# Do not merge without a real ID; deploy will fail.
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

[vars]
TENANT_ID = "daskuechenhaus"

# Secrets (never in wrangler.toml):
#   wrangler secret put API_SECRET
