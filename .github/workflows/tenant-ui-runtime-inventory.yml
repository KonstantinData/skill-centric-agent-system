name: Tenant UI Runtime Inventory

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: Hetzner environment to inspect
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
        default: prod
      hostname:
        description: Tenant hostname to inspect
        required: true
        type: string
        default: tenant.example.com
      apply_disk_cleanup:
        description: Apply approved disk cleanup for Docker, tmp deploy artifacts, and journals
        required: true
        type: boolean
        default: false
      confirm_production:
        description: Required true when apply_disk_cleanup=true on prod
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: tenant-ui-runtime-inventory-${{ github.ref }}-${{ inputs.target_environment }}
  cancel-in-progress: false

jobs:
  inventory:
    name: Read-only tenant UI runtime inventory
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      TARGET_ENVIRONMENT: ${{ inputs.target_environment }}
      TENANT_HOSTNAME: ${{ inputs.hostname }}
      APPLY_DISK_CLEANUP: ${{ inputs.apply_disk_cleanup }}
      CONFIRM_PRODUCTION: ${{ inputs.confirm_production }}
      HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
      HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
      HETZNER_USER: ${{ secrets.HETZNER_USER }}
      SCAS_DEV_HETZNER_HOST: ${{ secrets.SCAS_DEV_HETZNER_HOST }}
      SCAS_DEV_HETZNER_SSH_KEY: ${{ secrets.SCAS_DEV_HETZNER_SSH_KEY }}
      SCAS_DEV_HETZNER_USER: ${{ secrets.SCAS_DEV_HETZNER_USER }}
      SCAS_STAGING_HETZNER_HOST: ${{ secrets.SCAS_STAGING_HETZNER_HOST }}
      SCAS_STAGING_HETZNER_SSH_KEY: ${{ secrets.SCAS_STAGING_HETZNER_SSH_KEY }}
      SCAS_STAGING_HETZNER_USER: ${{ secrets.SCAS_STAGING_HETZNER_USER }}
      SCAS_PROD_HETZNER_HOST: ${{ secrets.SCAS_PROD_HETZNER_HOST }}
      SCAS_PROD_HETZNER_SSH_KEY: ${{ secrets.SCAS_PROD_HETZNER_SSH_KEY }}
      SCAS_PROD_HETZNER_USER: ${{ secrets.SCAS_PROD_HETZNER_USER }}

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve target secrets
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "${TENANT_HOSTNAME}" =~ ^[A-Za-z0-9.-]+$ ]]; then
            echo "::error::hostname may contain only letters, numbers, dots, and hyphens."
            exit 1
          fi

          if [ "${APPLY_DISK_CLEANUP}" = "true" ] \
            && [ "${TARGET_ENVIRONMENT}" = "prod" ] \
            && [ "${CONFIRM_PRODUCTION}" != "true" ]; then
            echo "::error::confirm_production must be true for production disk cleanup."
            exit 1
          fi

          resolve_env_secret() {
            local target_env="$1"
            local logical_name="$2"
            local value=""
            case "${target_env}" in
              dev)
                case "${logical_name}" in
                  HETZNER_HOST) value="${SCAS_DEV_HETZNER_HOST:-${HETZNER_HOST:-}}" ;;
                  HETZNER_SSH_KEY) value="${SCAS_DEV_HETZNER_SSH_KEY:-${HETZNER_SSH_KEY:-}}" ;;
                  HETZNER_USER) value="${SCAS_DEV_HETZNER_USER:-${HETZNER_USER:-}}" ;;
                  *) echo "::error::Unknown secret mapping for ${logical_name}" ; exit 1 ;;
                esac
                ;;
              staging)
                case "${logical_name}" in
                  HETZNER_HOST) value="${SCAS_STAGING_HETZNER_HOST:-}" ;;
                  HETZNER_SSH_KEY) value="${SCAS_STAGING_HETZNER_SSH_KEY:-}" ;;
                  HETZNER_USER) value="${SCAS_STAGING_HETZNER_USER:-}" ;;
                  *) echo "::error::Unknown secret mapping for ${logical_name}" ; exit 1 ;;
                esac
                ;;
              prod)
                case "${logical_name}" in
                  HETZNER_HOST) value="${SCAS_PROD_HETZNER_HOST:-}" ;;
                  HETZNER_SSH_KEY) value="${SCAS_PROD_HETZNER_SSH_KEY:-}" ;;
                  HETZNER_USER) value="${SCAS_PROD_HETZNER_USER:-}" ;;
                  *) echo "::error::Unknown secret mapping for ${logical_name}" ; exit 1 ;;
                esac
                ;;
              *)
                echo "::error::Unsupported target_environment: ${target_env}"
                exit 1
                ;;
            esac
            printf '%s' "${value}"
          }

          TARGET_HETZNER_HOST="$(resolve_env_secret "${TARGET_ENVIRONMENT}" HETZNER_HOST)"
          TARGET_HETZNER_SSH_KEY="$(resolve_env_secret "${TARGET_ENVIRONMENT}" HETZNER_SSH_KEY)"
          TARGET_HETZNER_USER="$(resolve_env_secret "${TARGET_ENVIRONMENT}" HETZNER_USER)"

          missing=0
          for name in TARGET_HETZNER_HOST TARGET_HETZNER_SSH_KEY TARGET_HETZNER_USER
          do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required ${TARGET_ENVIRONMENT} secret: ${name#TARGET_}"
              missing=1
            fi
          done
          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

          {
            printf 'TARGET_HETZNER_HOST=%s\n' "${TARGET_HETZNER_HOST}"
            printf 'TARGET_HETZNER_USER=%s\n' "${TARGET_HETZNER_USER}"
            echo 'TARGET_HETZNER_SSH_KEY<<__SCAS_HETZNER_SSH_KEY__'
            printf '%s\n' "${TARGET_HETZNER_SSH_KEY}"
            echo '__SCAS_HETZNER_SSH_KEY__'
          } >> "${GITHUB_ENV}"

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail

          install -m 700 -d "${HOME}/.ssh"
          printf '%s\n' "${TARGET_HETZNER_SSH_KEY}" | tr -d '\r' > "${HOME}/.ssh/hetzner_key"
          chmod 600 "${HOME}/.ssh/hetzner_key"

          if ! ssh-keygen -y -f "${HOME}/.ssh/hetzner_key" >/dev/null; then
            echo "::error::HETZNER_SSH_KEY must contain the complete private OpenSSH key block."
            exit 1
          fi

          ssh-keyscan -H "${TARGET_HETZNER_HOST}" >> "${HOME}/.ssh/known_hosts"

      - name: Run approved disk cleanup
        if: inputs.apply_disk_cleanup == true
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p tenant-ui-runtime-inventory
          ssh \
            -i "${HOME}/.ssh/hetzner_key" \
            -o BatchMode=yes \
            -o ConnectTimeout=10 \
            "${TARGET_HETZNER_USER}@${TARGET_HETZNER_HOST}" \
            "TARGET_ENVIRONMENT='${TARGET_ENVIRONMENT}' bash -s" \
            > tenant-ui-runtime-inventory/disk-cleanup.md <<'REMOTE'
          set -euo pipefail

          sudo_if_needed() {
            if [ "$(id -u)" -eq 0 ]; then
              "$@"
            else
              sudo -n "$@"
            fi
          }

          section() {
            printf '\n## %s\n\n' "$1"
          }

          printf '# DKH Runtime Disk Cleanup\n\n'
          printf -- '- Target environment: `%s`\n' "${TARGET_ENVIRONMENT}"
          printf -- '- Started at: `%s`\n' "$(date -Is)"

          section "Before"
          df -hT /
          printf '\n'
          docker system df 2>/dev/null || true

          section "Docker image retention"
          if command -v docker >/dev/null 2>&1; then
            mapfile -t running_image_ids < <(
              docker ps -q \
                | xargs -r docker inspect --format '{{.Image}}' \
                | sort -u
            )

            declare -A keep_images=()
            for image_id in "${running_image_ids[@]}"; do
              keep_images["${image_id}"]=1
            done

            rollback_kept=0
            mapfile -t tenant_ui_images < <(
              docker images scas-liquisto-workbench \
                --format '{{.CreatedAt}}\t{{.ID}}\t{{.Repository}}:{{.Tag}}' \
                | sort -r
            )
            for row in "${tenant_ui_images[@]}"; do
              image_id="$(printf '%s\n' "${row}" | awk -F '\t' '{print $2}')"
              image_ref="$(printf '%s\n' "${row}" | awk -F '\t' '{print $3}')"
              if [ -n "${keep_images[${image_id}]:-}" ]; then
                printf -- '- Keep running image `%s` `%s`\n' "${image_id}" "${image_ref}"
                continue
              fi
              if [ "${rollback_kept}" -lt 1 ]; then
                keep_images["${image_id}"]=1
                rollback_kept=$((rollback_kept + 1))
                printf -- '- Keep rollback image `%s` `%s`\n' "${image_id}" "${image_ref}"
                continue
              fi
              printf -- '- Remove unused image `%s` `%s`\n' "${image_id}" "${image_ref}"
              docker image rm "${image_id}" || true
            done

            printf '\n### Stopped containers\n\n'
            docker container prune -f || true

            printf '\n### Dangling images\n\n'
            docker image prune -f || true

            printf '\n### Build cache\n\n'
            docker builder prune -f --filter until=24h || true
          else
            printf 'docker command not available.\n'
          fi

          section "Temporary deploy artifacts"
          for pattern in \
            '/tmp/dkh-crm-*.tar.gz' \
            '/tmp/dkh-crm-origin-*.pem' \
            '/tmp/dkh-crm-origin-*.key' \
            '/tmp/daskuechenhaus-admin-api-*.py' \
            '/tmp/daskuechenhaus-admin-api-*.service' \
            '/tmp/scas-runtime-retention-cleanup-*.tar.gz'
          do
            find /tmp -maxdepth 1 -type f -name "${pattern##*/}" -mtime +0 -print -delete 2>/dev/null || true
          done
          find /tmp -maxdepth 1 -type d \( \
            -name 'dkh-crm-deploy-*' -o \
            -name 'scas-runtime-retention-cleanup-*' \
          \) -mtime +0 -print -exec rm -rf --one-file-system {} + 2>/dev/null || true

          section "System journal"
          if command -v journalctl >/dev/null 2>&1; then
            sudo_if_needed journalctl --disk-usage || true
            sudo_if_needed journalctl --vacuum-size=500M || true
            sudo_if_needed journalctl --disk-usage || true
          else
            printf 'journalctl command not available.\n'
          fi

          section "After"
          df -hT /
          printf '\n'
          docker system df 2>/dev/null || true
          REMOTE

      - name: Collect read-only runtime inventory
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p tenant-ui-runtime-inventory
          ssh \
            -i "${HOME}/.ssh/hetzner_key" \
            -o BatchMode=yes \
            -o ConnectTimeout=10 \
            "${TARGET_HETZNER_USER}@${TARGET_HETZNER_HOST}" \
            "TENANT_HOSTNAME='${TENANT_HOSTNAME}' TARGET_ENVIRONMENT='${TARGET_ENVIRONMENT}' bash -s" \
            > tenant-ui-runtime-inventory/inventory.md <<'REMOTE'
          set -euo pipefail

          redact() {
            python3 -c '
          import re
          import sys

          payload = sys.stdin.read()
          sensitive = (
              r"(?:TOKEN|KEY|SECRET|PASSWORD|PASS|API_KEY|AUTH|"
              r"SESSION|CONTEXT|PRINCIPAL|MEMBERSHIP)"
          )
          payload = re.sub(
              r"(\"[A-Za-z0-9_]*" + sensitive + r"[A-Za-z0-9_]*=)(?:\\\\.|[^\"])*\"",
              r"\1<redacted>\"",
              payload,
          )
          payload = re.sub(
              r"([A-Za-z0-9_]*" + sensitive + r"[A-Za-z0-9_]*=)[^\s\"]+",
              r"\1<redacted>",
              payload,
          )
          payload = re.sub(
              r"(Bearer )[A-Za-z0-9._~+/=-]+",
              r"\1<redacted>",
              payload,
          )
          sys.stdout.write(payload)
          '
          }

          section() {
            printf '\n## %s\n\n' "$1"
          }

          printf '# Tenant UI Runtime Inventory\n\n'
          printf -- '- Target environment: `%s`\n' "${TARGET_ENVIRONMENT}"
          printf -- '- Tenant hostname: `%s`\n' "${TENANT_HOSTNAME}"
          printf -- '- Remote hostname: `%s`\n' "$(hostname -f 2>/dev/null || hostname)"
          printf -- '- Collected at: `%s`\n' "$(date -Is)"

          section "Disk usage"
          df -hT 2>&1 | redact || true
          printf '\n### Inodes\n\n'
          df -ih 2>&1 | redact || true
          printf '\n### Block devices\n\n'
          lsblk -o NAME,SIZE,FSTYPE,MOUNTPOINTS 2>&1 | redact || true
          printf '\n### Top-level directory sizes\n\n'
          sudo -n du -xh --max-depth=1 / /opt /var /tmp 2>/dev/null \
            | sort -h \
            | redact || true
          printf '\n### Daskuechenhaus directory sizes\n\n'
          sudo -n du -xh --max-depth=3 /opt/daskuechenhaus /var/lib/daskuechenhaus 2>/dev/null \
            | sort -h \
            | tail -n 80 \
            | redact || true
          printf '\n### PostgreSQL directory sizes\n\n'
          sudo -n du -xh --max-depth=2 /var/lib/postgresql 2>/dev/null \
            | sort -h \
            | tail -n 60 \
            | redact || true
          printf '\n### Docker disk usage\n\n'
          if command -v docker >/dev/null 2>&1; then
            docker system df -v 2>&1 | redact || true
          else
            printf 'docker command not available.\n'
          fi

          section "Listening ports"
          if command -v ss >/dev/null 2>&1; then
            ss -tulpn 2>/dev/null | grep -Ei 'node|next|3000|3027|80|443|nginx|caddy|apache' | redact || true
          else
            printf 'ss command not available.\n'
          fi

          section "Candidate processes"
          ps -eo pid,user,etime,cmd --sort=cmd \
            | grep -Ei 'tenant|scas|node|next|nginx|caddy|apache' \
            | grep -v grep \
            | redact || true

          section "Candidate systemd units"
          if command -v systemctl >/dev/null 2>&1; then
            systemctl list-units --type=service --all --no-pager \
              | grep -Ei 'tenant|scas|condata|daskuechenhaus|liquisto' \
              | redact || true
          else
            printf 'systemctl command not available.\n'
          fi

          section "Daskuechenhaus CRM status"
          if command -v systemctl >/dev/null 2>&1; then
            sudo -n systemctl status daskuechenhaus-crm.service --no-pager -l 2>&1 | redact || true
            printf '\n### Admin API health\n\n'
            curl -sS 'http://127.0.0.1:8715/health' 2>&1 | redact || true
            printf '\n'
            printf '\n### Origin `/kunden` response\n\n'
            curl -sS -D - \
              -H 'x-dkh-user-email: k.milonas@schober-daskuechenhaus.de' \
              'http://127.0.0.1:3001/kunden' \
              -o /tmp/dkh-crm-kunden-body.txt 2>&1 | redact || true
            printf '\n'
            head -c 1200 /tmp/dkh-crm-kunden-body.txt 2>/dev/null | redact || true
            printf '\n\n### CRM journal\n\n'
            sudo -n journalctl -u daskuechenhaus-crm.service -n 160 --no-pager -o short-iso 2>&1 | redact || true
            printf '\n### Admin API journal\n\n'
            sudo -n journalctl -u daskuechenhaus-admin-api.service -n 120 --no-pager -o short-iso 2>&1 | redact || true
          else
            printf 'systemctl command not available.\n'
          fi

          section "Candidate systemd definitions"
          for dir in /etc/systemd/system /lib/systemd/system /usr/lib/systemd/system; do
            if [ -d "${dir}" ]; then
              grep -RInE 'tenant|condata|liquisto|SCAS_' "${dir}" 2>/dev/null \
                | redact || true
            fi
          done

          section "Container runtime"
          if command -v docker >/dev/null 2>&1; then
            docker ps --no-trunc --format 'table {{.ID}}\t{{.Image}}\t{{.Names}}\t{{.Ports}}\t{{.Command}}\t{{.Status}}' 2>/dev/null \
              | grep -Ei 'tenant|scas|liquisto|3000|3027|node|next|IMAGE' \
              | redact || true
            docker ps --no-trunc --format '{{.ID}} {{.Names}} {{.Image}} {{.Command}}' 2>/dev/null \
              | grep -Ei 'tenant|scas|liquisto|3000|3027|node|next' \
              | awk '{print $1}' \
              | while read -r container_id; do
                  printf '\n### Container `%s`\n\n' "${container_id}"
                  docker inspect \
                    --format='Name={{.Name}}\nImage={{.Config.Image}}\nWorkingDir={{.Config.WorkingDir}}\nEntrypoint={{json .Config.Entrypoint}}\nCmd={{json .Config.Cmd}}\nLabels={{json .Config.Labels}}\nMounts={{json .Mounts}}' \
                    "${container_id}" 2>/dev/null | redact || true
                done
          else
            printf 'docker command not available.\n'
          fi

          section "SCAS-managed runtime configuration keys"
          for env_file in /opt/liquisto/scas-liquisto-workbench.env; do
            if [ -f "${env_file}" ]; then
              printf '### `%s`\n\n' "${env_file}"
              grep -nE '^(SCAS_UI_AUTH_MODE|SCAS_UI_UPSTREAM_AUTH_TRUSTED|SCAS_CONTROL_API_URL|SCAS_TENANT_ADMIN_TOKEN|SCAS_UI_SESSION_CONTEXT_JSON)=' "${env_file}" \
                | sed -E 's/^(.*=).*/\1<redacted>/' || true
              printf '\n'
            fi
          done

          section "Candidate container definitions"
          for root in /opt /srv /var/www /home; do
            if [ ! -d "${root}" ]; then
              continue
            fi
            find "${root}" -maxdepth 6 \( \
              -iname 'docker-compose.yml' -o \
              -iname 'docker-compose.yaml' -o \
              -iname 'compose.yml' -o \
              -iname 'compose.yaml' -o \
              -iname 'Dockerfile' \
            \) 2>/dev/null | sort | while read -r container_file; do
              printf '### `%s`\n\n' "${container_file}"
              grep -nE 'image:|build:|container_name:|command:|ports:|volumes:|working_dir:|3000|3027|SCAS_' "${container_file}" 2>/dev/null \
                | redact || true
              printf '\n'
            done
          done

          section "Reverse proxy references"
          for dir in /etc/nginx /etc/caddy /etc/apache2; do
            if [ -d "${dir}" ]; then
              grep -RInE "${TENANT_HOSTNAME}|tenant|condata|liquisto|3000|3027|proxy_pass|reverse_proxy" "${dir}" 2>/dev/null \
                | redact || true
            fi
          done

          section "Candidate Git repositories"
          for root in /opt /srv /var/www /home; do
            if [ ! -d "${root}" ]; then
              continue
            fi
            find "${root}" -maxdepth 5 -type d -name .git 2>/dev/null | sort | while read -r git_dir; do
              repo="${git_dir%/.git}"
              printf '### `%s`\n\n' "${repo}"
              git -C "${repo}" rev-parse --short=12 HEAD 2>/dev/null | sed 's/^/- HEAD: `/' | sed 's/$/`/' || true
              git -C "${repo}" branch --show-current 2>/dev/null | sed 's/^/- Branch: `/' | sed 's/$/`/' || true
              git -C "${repo}" remote -v 2>/dev/null | redact | sed 's/^/- Remote: /' || true
              printf '\n'
            done
          done

          section "Candidate tenant UI app files"
          for root in /opt /srv /var/www /home; do
            if [ ! -d "${root}" ]; then
              continue
            fi
            find "${root}" -maxdepth 7 \( \
              -path '*/apps/liquisto-workbench/package.json' -o \
              -path '*/deploy/liquisto-workbench/Dockerfile' -o \
              -iname '*liquisto*workbench*' \
            \) 2>/dev/null | sort | redact || true
          done
          REMOTE

      - name: Upload inventory artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tenant-ui-runtime-inventory-${{ inputs.target_environment }}
          path: tenant-ui-runtime-inventory/
          if-no-files-found: error
