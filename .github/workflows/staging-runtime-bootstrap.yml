name: Runtime Bootstrap

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: Target environment to bootstrap
        required: true
        type: choice
        options:
          - staging
          - prod
        default: staging
      confirm_production:
        description: Required true for target_environment=prod
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: runtime-bootstrap-${{ inputs.target_environment }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bootstrap-runtime:
    name: Bootstrap Hetzner runtime storage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: ${{ inputs.target_environment == 'prod' && 'production' || inputs.target_environment }}
    if: >-
      github.event_name == 'workflow_dispatch'
      && (inputs.target_environment == 'staging' || inputs.target_environment == 'prod')

    env:
      TARGET_ENVIRONMENT: ${{ inputs.target_environment }}
      CONFIRM_PRODUCTION: ${{ inputs.confirm_production }}
      SCAS_STAGING_HETZNER_HOST: ${{ secrets.SCAS_STAGING_HETZNER_HOST }}
      SCAS_STAGING_HETZNER_SSH_KEY: ${{ secrets.SCAS_STAGING_HETZNER_SSH_KEY }}
      SCAS_STAGING_HETZNER_USER: ${{ secrets.SCAS_STAGING_HETZNER_USER }}
      SCAS_PROD_HETZNER_HOST: ${{ secrets.SCAS_PROD_HETZNER_HOST }}
      SCAS_PROD_HETZNER_SSH_KEY: ${{ secrets.SCAS_PROD_HETZNER_SSH_KEY }}
      SCAS_PROD_HETZNER_USER: ${{ secrets.SCAS_PROD_HETZNER_USER }}
      SCAS_REMOTE_MIGRATIONS_DIR: /opt/scas/migrations/hetzner/postgres

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check required secrets are present
        shell: bash
        run: |
          set -euo pipefail

          case "${TARGET_ENVIRONMENT}" in
            staging)
              HETZNER_HOST="${SCAS_STAGING_HETZNER_HOST:-}"
              HETZNER_SSH_KEY="${SCAS_STAGING_HETZNER_SSH_KEY:-}"
              HETZNER_USER="${SCAS_STAGING_HETZNER_USER:-}"
              SCAS_RUNTIME_DB="scas_runtime_staging"
              SCAS_RUNTIME_DB_OWNER="scas_runtime_staging_app"
              SCAS_RUNTIME_ROOT="/opt/scas/runtime/staging"
              ;;
            prod)
              if [ "${CONFIRM_PRODUCTION}" != "true" ]; then
                echo "::error::confirm_production must be true for production runtime bootstrap."
                exit 1
              fi
              HETZNER_HOST="${SCAS_PROD_HETZNER_HOST:-}"
              HETZNER_SSH_KEY="${SCAS_PROD_HETZNER_SSH_KEY:-}"
              HETZNER_USER="${SCAS_PROD_HETZNER_USER:-}"
              SCAS_RUNTIME_DB="scas_runtime_prod"
              SCAS_RUNTIME_DB_OWNER="scas_runtime_prod_app"
              SCAS_RUNTIME_ROOT="/opt/scas/runtime/prod"
              ;;
            *)
              echo "::error::Unsupported target_environment: ${TARGET_ENVIRONMENT}"
              exit 1
              ;;
          esac

          {
            echo "HETZNER_HOST=${HETZNER_HOST}"
            echo "HETZNER_USER=${HETZNER_USER}"
            echo "SCAS_RUNTIME_DB=${SCAS_RUNTIME_DB}"
            echo "SCAS_RUNTIME_DB_OWNER=${SCAS_RUNTIME_DB_OWNER}"
            echo "SCAS_RUNTIME_ROOT=${SCAS_RUNTIME_ROOT}"
            echo 'HETZNER_SSH_KEY<<__SCAS_HETZNER_SSH_KEY__'
            printf '%s\n' "${HETZNER_SSH_KEY}"
            echo '__SCAS_HETZNER_SSH_KEY__'
          } >> "${GITHUB_ENV}"

          missing=0
          for name in HETZNER_HOST HETZNER_SSH_KEY HETZNER_USER
          do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required secret for ${TARGET_ENVIRONMENT}: ${name}"
              missing=1
            fi
          done

          exit "${missing}"

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail

          install -m 700 -d "${HOME}/.ssh"
          printf '%s\n' "${HETZNER_SSH_KEY}" | tr -d '\r' > "${HOME}/.ssh/hetzner_key"
          chmod 600 "${HOME}/.ssh/hetzner_key"

          if ! ssh-keygen -y -f "${HOME}/.ssh/hetzner_key" >/dev/null; then
            echo "::error::HETZNER_SSH_KEY must contain the complete private OpenSSH key block."
            echo "::error::The configured key is missing the expected OpenSSH private key header."
            exit 1
          fi

          ssh-keyscan -H "${HETZNER_HOST}" >> "${HOME}/.ssh/known_hosts"

      - name: Package runtime bootstrap files
        shell: bash
        run: |
          set -euo pipefail

          tar -czf scas-runtime-bootstrap.tar.gz \
            scripts/hetzner/bootstrap_runtime_plane.sh \
            migrations/hetzner/postgres

      - name: Upload runtime bootstrap files
        shell: bash
        run: |
          set -euo pipefail

          scp \
            -i "${HOME}/.ssh/hetzner_key" \
            -o BatchMode=yes \
            -o ConnectTimeout=10 \
            scas-runtime-bootstrap.tar.gz \
            "${HETZNER_USER}@${HETZNER_HOST}:/tmp/scas-runtime-bootstrap-${GITHUB_RUN_ID}.tar.gz"

      - name: Bootstrap runtime storage
        shell: bash
        run: |
          set -euo pipefail

          ssh \
            -i "${HOME}/.ssh/hetzner_key" \
            -o BatchMode=yes \
            -o ConnectTimeout=10 \
            "${HETZNER_USER}@${HETZNER_HOST}" \
            "TARGET_ENVIRONMENT='${TARGET_ENVIRONMENT}' SCAS_RUNTIME_DB='${SCAS_RUNTIME_DB}' SCAS_RUNTIME_DB_OWNER='${SCAS_RUNTIME_DB_OWNER}' SCAS_RUNTIME_ROOT='${SCAS_RUNTIME_ROOT}' SCAS_REMOTE_MIGRATIONS_DIR='${SCAS_REMOTE_MIGRATIONS_DIR}' GITHUB_RUN_ID='${GITHUB_RUN_ID}' bash -s" <<'REMOTE'
          set -euo pipefail

          sudo_if_needed() {
            if [ "$(id -u)" -eq 0 ]; then
              "$@"
            else
              sudo "$@"
            fi
          }

          archive="/tmp/scas-runtime-bootstrap-${GITHUB_RUN_ID}.tar.gz"
          workdir="/tmp/scas-runtime-bootstrap-${GITHUB_RUN_ID}"

          rm -rf "${workdir}"
          install -d -m 755 "${workdir}"
          tar -xzf "${archive}" -C "${workdir}"
          chmod -R a+rX "${workdir}"

          sudo_if_needed install -d -m 755 /opt/scas/migrations/hetzner
          sudo_if_needed rm -rf "${SCAS_REMOTE_MIGRATIONS_DIR}"
          sudo_if_needed install -d -m 755 "${SCAS_REMOTE_MIGRATIONS_DIR}"
          sudo_if_needed cp "${workdir}"/migrations/hetzner/postgres/*.sql "${SCAS_REMOTE_MIGRATIONS_DIR}/"

          hostname
          pwd

          sudo_if_needed env \
            SCAS_RUNTIME_DB="${SCAS_RUNTIME_DB}" \
            SCAS_RUNTIME_DB_OWNER="${SCAS_RUNTIME_DB_OWNER}" \
            SCAS_RUNTIME_ROOT="${SCAS_RUNTIME_ROOT}" \
            bash "${workdir}/scripts/hetzner/bootstrap_runtime_plane.sh" \
              --migrations-dir "${SCAS_REMOTE_MIGRATIONS_DIR}"

          test -w "${SCAS_RUNTIME_ROOT}"
          sudo -u postgres psql -d "${SCAS_RUNTIME_DB}" -Atc 'SELECT count(*) FROM runtime.runtime_runs;'

          rm -f "${archive}"
          REMOTE
