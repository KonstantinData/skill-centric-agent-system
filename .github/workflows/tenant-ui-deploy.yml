name: Tenant UI Deploy

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: Target Hetzner environment
        required: true
        type: choice
        options:
          - staging
          - prod
        default: staging
      tenant_id:
        description: Tenant ID to deploy
        required: true
        type: string
        default: liquisto
      hostname:
        description: Tenant hostname served by the reverse proxy
        required: true
        type: string
        default: liquisto.cloud
      control_api_url:
        description: Control API base URL for the target environment
        required: true
        type: string
      upstream_auth_evidence_url:
        description: Evidence URL proving upstream auth/session injection is approved
        required: false
        type: string
        default: ""
      login_url:
        description: Optional upstream identity login URL shown by the UI when no trusted session is present
        required: false
        type: string
        default: ""
      customer_cases_api_url:
        description: Optional customer cases API base URL for tenant case management
        required: false
        type: string
        default: ""
      auth_mode:
        description: UI authentication mode
        required: true
        type: choice
        options:
          - required
          - local-login
        default: required
      apply_deploy:
        description: Apply the deployment on the target host
        required: true
        type: boolean
        default: false
      confirm_production:
        description: Required true for target_environment=prod
        required: true
        type: boolean
        default: false
      compose_project:
        description: Remote Docker Compose project name
        required: true
        type: string
        default: liquisto
      existing_compose_path:
        description: Deprecated compatibility input; SCAS-managed deploy does not read it
        required: true
        type: string
        default: /opt/liquisto/docker-compose.yml
      remote_override_path:
        description: Remote compose override path managed by SCAS
        required: true
        type: string
        default: /opt/liquisto/scas-liquisto-workbench.override.yml
      service_name:
        description: Docker Compose service serving the tenant UI
        required: true
        type: string
        default: app
      ui_app:
        description: Tenant UI application to build and deploy
        required: true
        type: choice
        options:
          - khh-workbench
          - liquisto-workbench
        default: liquisto-workbench
      local_health_port:
        description: Remote localhost port used by tenant UI health checks
        required: true
        type: string
        default: "3027"
      owner_principal_id:
        description: Non-secret owner principal id used to build tenant-local session context
        required: false
        type: string
        default: ""
      manage_reverse_proxy:
        description: Write and enable a tenant-specific Nginx server block
        required: true
        type: boolean
        default: false
      reverse_proxy_config_path:
        description: Remote Nginx sites-available path managed by SCAS
        required: true
        type: string
        default: /etc/nginx/sites-available/liquisto
      reverse_proxy_cert_hostname:
        description: Existing origin certificate hostname used by the Nginx server block
        required: true
        type: string
        default: liquisto.cloud
      sync_cloudflare_dns:
        description: Update the tenant Cloudflare apex and www records to the deployment host
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: tenant-ui-deploy-${{ github.ref }}-${{ inputs.target_environment }}-${{ inputs.tenant_id }}
  cancel-in-progress: false

jobs:
  tenant-ui-deploy:
    name: Build and optionally deploy tenant UI
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      TARGET_ENVIRONMENT: ${{ inputs.target_environment }}
      TENANT_ID: ${{ inputs.tenant_id }}
      TENANT_HOSTNAME: ${{ inputs.hostname }}
      CONTROL_API_URL: ${{ inputs.control_api_url }}
      UPSTREAM_AUTH_EVIDENCE_URL: ${{ inputs.upstream_auth_evidence_url }}
      SCAS_UI_LOGIN_URL: ${{ inputs.login_url }}
      CUSTOMER_CASES_API_URL: ${{ inputs.customer_cases_api_url }}
      SCAS_UI_AUTH_MODE_TARGET: ${{ inputs.auth_mode }}
      APPLY_DEPLOY: ${{ inputs.apply_deploy }}
      CONFIRM_PRODUCTION: ${{ inputs.confirm_production }}
      COMPOSE_PROJECT: ${{ inputs.compose_project }}
      REMOTE_OVERRIDE_PATH: ${{ inputs.remote_override_path }}
      SERVICE_NAME: ${{ inputs.service_name }}
      UI_APP: ${{ inputs.ui_app }}
      LOCAL_HEALTH_PORT: ${{ inputs.local_health_port }}
      OWNER_PRINCIPAL_ID_INPUT: ${{ inputs.owner_principal_id }}
      MANAGE_REVERSE_PROXY: ${{ inputs.manage_reverse_proxy }}
      REVERSE_PROXY_CONFIG_PATH: ${{ inputs.reverse_proxy_config_path }}
      REVERSE_PROXY_CERT_HOSTNAME: ${{ inputs.reverse_proxy_cert_hostname }}
      SYNC_CLOUDFLARE_DNS: ${{ inputs.sync_cloudflare_dns }}
      HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
      HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
      HETZNER_USER: ${{ secrets.HETZNER_USER }}
      SCAS_STAGING_HETZNER_HOST: ${{ secrets.SCAS_STAGING_HETZNER_HOST }}
      SCAS_STAGING_HETZNER_SSH_KEY: ${{ secrets.SCAS_STAGING_HETZNER_SSH_KEY }}
      SCAS_STAGING_HETZNER_USER: ${{ secrets.SCAS_STAGING_HETZNER_USER }}
      SCAS_STAGING_CONTROL_API_TOKEN: ${{ secrets.SCAS_STAGING_CONTROL_API_TOKEN }}
      SCAS_STAGING_UI_SESSION_CONTEXT_JSON: ${{ secrets.SCAS_STAGING_UI_SESSION_CONTEXT_JSON }}
      SCAS_STAGING_UI_LOGIN_USERS_JSON: ${{ secrets.SCAS_STAGING_UI_LOGIN_USERS_JSON }}
      SCAS_STAGING_TENANT_ADMIN_TOKEN: ${{ secrets.SCAS_STAGING_TENANT_ADMIN_TOKEN }}
      SCAS_STAGING_DASKUECHENHAUS_CASES_API_SECRET: ${{ secrets.SCAS_STAGING_DASKUECHENHAUS_CASES_API_SECRET }}
      SCAS_STAGING_LIQUISTO_OWNER_PRINCIPAL_ID: ${{ secrets.SCAS_STAGING_LIQUISTO_OWNER_PRINCIPAL_ID }}
      SCAS_STAGING_DASKUECHENHAUS_OWNER_PRINCIPAL_ID: ${{ secrets.SCAS_STAGING_DASKUECHENHAUS_OWNER_PRINCIPAL_ID }}
      SCAS_STAGING_TENANT_KINDERHAUS_OWNER_PRINCIPAL_ID: ${{ secrets.SCAS_STAGING_TENANT_KINDERHAUS_OWNER_PRINCIPAL_ID }}
      SCAS_PROD_HETZNER_HOST: ${{ secrets.SCAS_PROD_HETZNER_HOST }}
      SCAS_PROD_HETZNER_SSH_KEY: ${{ secrets.SCAS_PROD_HETZNER_SSH_KEY }}
      SCAS_PROD_HETZNER_USER: ${{ secrets.SCAS_PROD_HETZNER_USER }}
      SCAS_PROD_CONTROL_API_TOKEN: ${{ secrets.SCAS_PROD_CONTROL_API_TOKEN }}
      SCAS_PROD_UI_SESSION_CONTEXT_JSON: ${{ secrets.SCAS_PROD_UI_SESSION_CONTEXT_JSON }}
      SCAS_PROD_UI_LOGIN_USERS_JSON: ${{ secrets.SCAS_PROD_UI_LOGIN_USERS_JSON }}
      SCAS_PROD_TENANT_ADMIN_TOKEN: ${{ secrets.SCAS_PROD_TENANT_ADMIN_TOKEN }}
      SCAS_PROD_DASKUECHENHAUS_CASES_API_SECRET: ${{ secrets.SCAS_PROD_DASKUECHENHAUS_CASES_API_SECRET }}
      SCAS_PROD_LIQUISTO_OWNER_PRINCIPAL_ID: ${{ secrets.SCAS_PROD_LIQUISTO_OWNER_PRINCIPAL_ID }}
      SCAS_PROD_DASKUECHENHAUS_OWNER_PRINCIPAL_ID: ${{ secrets.SCAS_PROD_DASKUECHENHAUS_OWNER_PRINCIPAL_ID }}
      SCAS_PROD_TENANT_KINDERHAUS_OWNER_PRINCIPAL_ID: ${{ secrets.SCAS_PROD_TENANT_KINDERHAUS_OWNER_PRINCIPAL_ID }}
      LIQUISTO_CLOUDFLARE_API_TOKEN: ${{ secrets.LIQUISTO_CLOUDFLARE_API_TOKEN }}
      LIQUISTO_CLOUDFLARE_ZONE_ID: ${{ secrets.LIQUISTO_CLOUDFLARE_ZONE_ID }}
      KHH_CLOUDFLARE_API_TOKEN: ${{ secrets.KHH_CLOUDFLARE_API_TOKEN }}
      KHH_CLOUDFLARE_ZONE_ID: ${{ secrets.KHH_CLOUDFLARE_ZONE_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate inputs
        shell: bash
        run: |
          set -euo pipefail

          case "${TARGET_ENVIRONMENT}" in
            staging|prod) ;;
            *) echo "::error::Unsupported target_environment: ${TARGET_ENVIRONMENT}" ; exit 1 ;;
          esac

          case "${SCAS_UI_AUTH_MODE_TARGET}" in
            required|local-login) ;;
            *) echo "::error::Unsupported auth_mode: ${SCAS_UI_AUTH_MODE_TARGET}" ; exit 1 ;;
          esac

          case "${UI_APP}" in
            khh-workbench) ;;
            liquisto-workbench) ;;
            *) echo "::error::Unsupported ui_app: ${UI_APP}" ; exit 1 ;;
          esac

          for value_name in TENANT_ID TENANT_HOSTNAME COMPOSE_PROJECT SERVICE_NAME
          do
            value="${!value_name}"
            if [[ ! "${value}" =~ ^[A-Za-z0-9._-]+$ ]]; then
              echo "::error::${value_name} contains unsupported characters."
              exit 1
            fi
          done

          if [[ ! "${LOCAL_HEALTH_PORT}" =~ ^[0-9]+$ ]]; then
            echo "::error::local_health_port must be numeric."
            exit 1
          fi

          if [ "${CONTROL_API_URL}" = "" ]; then
            echo "::error::control_api_url is required."
            exit 1
          fi

          if [ -n "${SCAS_UI_LOGIN_URL}" ] && [[ ! "${SCAS_UI_LOGIN_URL}" =~ ^https:// ]]; then
            echo "::error::login_url must be an https URL when provided."
            exit 1
          fi

          if [[ "${SCAS_UI_LOGIN_URL}" == *"'"* ]]; then
            echo "::error::login_url contains unsupported characters."
            exit 1
          fi

          if [ -n "${CUSTOMER_CASES_API_URL}" ] && [[ ! "${CUSTOMER_CASES_API_URL}" =~ ^https:// ]]; then
            echo "::error::customer_cases_api_url must be an https URL when provided."
            exit 1
          fi

          if [[ "${CUSTOMER_CASES_API_URL}" == *"'"* ]]; then
            echo "::error::customer_cases_api_url contains unsupported characters."
            exit 1
          fi

          if [[ "${REMOTE_OVERRIDE_PATH}" != /opt/* ]]; then
            echo "::error::remote_override_path must stay under /opt."
            exit 1
          fi

          if [ -n "${OWNER_PRINCIPAL_ID_INPUT}" ] \
            && [[ ! "${OWNER_PRINCIPAL_ID_INPUT}" =~ ^[a-z][a-z0-9-]*$ ]]; then
            echo "::error::owner_principal_id must be a non-secret stable id, not an email address."
            exit 1
          fi

          if [ "${MANAGE_REVERSE_PROXY}" = "true" ]; then
            if [[ "${REVERSE_PROXY_CONFIG_PATH}" != /etc/nginx/sites-available/* ]]; then
              echo "::error::reverse_proxy_config_path must stay under /etc/nginx/sites-available."
              exit 1
            fi
            if [[ ! "${REVERSE_PROXY_CERT_HOSTNAME}" =~ ^[A-Za-z0-9.-]+$ ]]; then
              echo "::error::reverse_proxy_cert_hostname contains unsupported characters."
              exit 1
            fi
          fi

          if [ "${APPLY_DEPLOY}" = "true" ] \
            && [ "${SCAS_UI_AUTH_MODE_TARGET}" = "required" ] \
            && [ "${UPSTREAM_AUTH_EVIDENCE_URL}" = "" ]; then
            echo "::error::upstream_auth_evidence_url is required when apply_deploy=true."
            exit 1
          fi

          if [ "${TARGET_ENVIRONMENT}" = "prod" ] && [ "${CONFIRM_PRODUCTION}" != "true" ]; then
            echo "::error::confirm_production must be true for production deploys."
            exit 1
          fi

          if [ "${SYNC_CLOUDFLARE_DNS}" = "true" ] \
            && [ "${TENANT_ID}" != "liquisto" ] \
            && [ "${TENANT_ID}" != "tenant_kinderhaus" ]; then
            echo "::error::Cloudflare DNS sync is only wired for approved tenant UI hostnames."
            exit 1
          fi

          if [ "${SYNC_CLOUDFLARE_DNS}" = "true" ]; then
            case "${TENANT_ID}:${TENANT_HOSTNAME}" in
              liquisto:liquisto.cloud) ;;
              tenant_kinderhaus:kinderhaus-heuschrecken.cloud) ;;
              *) echo "::error::Cloudflare DNS sync hostname is not approved for ${TENANT_ID}." ; exit 1 ;;
            esac
          fi

          if [ "${TENANT_ID}" = "tenant_kinderhaus" ] \
            && [ "${TENANT_HOSTNAME}" != "kinderhaus-heuschrecken.cloud" ]; then
            echo "::error::tenant_kinderhaus must deploy to kinderhaus-heuschrecken.cloud."
            exit 1
          fi

      - name: Build tenant UI image
        shell: bash
        run: |
          set -euo pipefail

          case "${UI_APP}" in
            khh-workbench)
              image_ref="scas-khh-workbench:${GITHUB_SHA}"
              dockerfile="deploy/khh-workbench/Dockerfile"
              image_title="SCAS KHH Workbench"
              image_archive="scas-khh-workbench-image.tar.gz"
              container_port="3000"
              health_path="/"
              ;;
            liquisto-workbench)
              image_ref="scas-liquisto-workbench:${GITHUB_SHA}"
              dockerfile="deploy/liquisto-workbench/Dockerfile"
              image_title="SCAS Liquisto Workbench"
              image_archive="scas-liquisto-workbench-image.tar.gz"
              container_port="3000"
              health_path="/"
              ;;
          esac

          docker build \
            --file "${dockerfile}" \
            --label "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.title=${image_title}" \
            --tag "${image_ref}" \
            .
          docker save "${image_ref}" | gzip > "${image_archive}"
          printf 'SCAS_UI_IMAGE=%s\n' "${image_ref}" >> "${GITHUB_ENV}"
          printf 'SCAS_UI_IMAGE_ARCHIVE=%s\n' "${image_archive}" >> "${GITHUB_ENV}"
          printf 'SCAS_UI_CONTAINER_PORT=%s\n' "${container_port}" >> "${GITHUB_ENV}"
          printf 'SCAS_UI_HEALTH_PATH=%s\n' "${health_path}" >> "${GITHUB_ENV}"

      - name: Upload image artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scas-tenant-ui-image-${{ github.sha }}
          path: ${{ env.SCAS_UI_IMAGE_ARCHIVE }}
          if-no-files-found: error

      - name: Stop before remote mutation when apply_deploy is false
        if: env.APPLY_DEPLOY != 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tenant-ui-deploy-evidence
          {
            printf '# Tenant UI Deploy Plan\n\n'
            printf -- '- Target environment: `%s`\n' "${TARGET_ENVIRONMENT}"
            printf -- '- Tenant ID: `%s`\n' "${TENANT_ID}"
            printf -- '- Hostname: `%s`\n' "${TENANT_HOSTNAME}"
            printf -- '- Image: `%s`\n' "${SCAS_UI_IMAGE}"
            printf -- '- UI app: `%s`\n' "${UI_APP}"
            printf -- '- Apply deploy: `false`\n'
            printf -- '- Result: image built and uploaded as an artifact; no remote host was changed.\n'
          } > tenant-ui-deploy-evidence/deploy-plan.md

      - name: Upload deploy plan artifact
        if: env.APPLY_DEPLOY != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tenant-ui-deploy-plan-${{ inputs.target_environment }}
          path: tenant-ui-deploy-evidence/deploy-plan.md
          if-no-files-found: error

      - name: Resolve target secrets
        if: env.APPLY_DEPLOY == 'true'
        shell: bash
        run: |
          set -euo pipefail

          resolve_env_secret() {
            local target_env="$1"
            local logical_name="$2"
            local value=""
            case "${target_env}" in
              staging)
                case "${logical_name}" in
                  HETZNER_HOST) value="${SCAS_STAGING_HETZNER_HOST:-}" ;;
                  HETZNER_SSH_KEY) value="${SCAS_STAGING_HETZNER_SSH_KEY:-}" ;;
                  HETZNER_USER) value="${SCAS_STAGING_HETZNER_USER:-}" ;;
                  UI_SESSION_CONTEXT_JSON) value="${SCAS_STAGING_UI_SESSION_CONTEXT_JSON:-}" ;;
                  UI_LOGIN_USERS_JSON) value="${SCAS_STAGING_UI_LOGIN_USERS_JSON:-}" ;;
                  OWNER_PRINCIPAL_ID)
                    case "${TENANT_ID}" in
                      liquisto) value="${SCAS_STAGING_LIQUISTO_OWNER_PRINCIPAL_ID:-}" ;;
                      daskuechenhaus) value="${SCAS_STAGING_DASKUECHENHAUS_OWNER_PRINCIPAL_ID:-}" ;;
                      tenant_kinderhaus) value="${SCAS_STAGING_TENANT_KINDERHAUS_OWNER_PRINCIPAL_ID:-}" ;;
                      *) echo "::error::Unsupported owner principal mapping for staging tenant ${TENANT_ID}" ; exit 1 ;;
                    esac
                    ;;
                  CUSTOMER_CASES_API_SECRET)
                    case "${TENANT_ID}" in
                      daskuechenhaus) value="${SCAS_STAGING_DASKUECHENHAUS_CASES_API_SECRET:-}" ;;
                      *) value="" ;;
                    esac
                    ;;
                  TENANT_ADMIN_TOKEN) value="${SCAS_STAGING_TENANT_ADMIN_TOKEN:-${SCAS_STAGING_CONTROL_API_TOKEN:-}}" ;;
                  *) echo "::error::Unknown secret mapping for ${logical_name}" ; exit 1 ;;
                esac
                ;;
              prod)
                case "${logical_name}" in
                  HETZNER_HOST) value="${SCAS_PROD_HETZNER_HOST:-}" ;;
                  HETZNER_SSH_KEY) value="${SCAS_PROD_HETZNER_SSH_KEY:-}" ;;
                  HETZNER_USER) value="${SCAS_PROD_HETZNER_USER:-}" ;;
                  UI_SESSION_CONTEXT_JSON) value="${SCAS_PROD_UI_SESSION_CONTEXT_JSON:-}" ;;
                  UI_LOGIN_USERS_JSON) value="${SCAS_PROD_UI_LOGIN_USERS_JSON:-}" ;;
                  OWNER_PRINCIPAL_ID)
                    case "${TENANT_ID}" in
                      liquisto) value="${SCAS_PROD_LIQUISTO_OWNER_PRINCIPAL_ID:-}" ;;
                      daskuechenhaus) value="${SCAS_PROD_DASKUECHENHAUS_OWNER_PRINCIPAL_ID:-}" ;;
                      tenant_kinderhaus) value="${SCAS_PROD_TENANT_KINDERHAUS_OWNER_PRINCIPAL_ID:-}" ;;
                      *) echo "::error::Unsupported owner principal mapping for prod tenant ${TENANT_ID}" ; exit 1 ;;
                    esac
                    ;;
                  CUSTOMER_CASES_API_SECRET)
                    case "${TENANT_ID}" in
                      daskuechenhaus) value="${SCAS_PROD_DASKUECHENHAUS_CASES_API_SECRET:-}" ;;
                      *) value="" ;;
                    esac
                    ;;
                  TENANT_ADMIN_TOKEN) value="${SCAS_PROD_TENANT_ADMIN_TOKEN:-${SCAS_PROD_CONTROL_API_TOKEN:-}}" ;;
                  *) echo "::error::Unknown secret mapping for ${logical_name}" ; exit 1 ;;
                esac
                ;;
              *)
                echo "::error::Unsupported target_environment: ${target_env}"
                exit 1
                ;;
            esac
            printf '%s' "${value}"
          }

          TARGET_HETZNER_HOST="$(resolve_env_secret "${TARGET_ENVIRONMENT}" HETZNER_HOST)"
          TARGET_HETZNER_SSH_KEY="$(resolve_env_secret "${TARGET_ENVIRONMENT}" HETZNER_SSH_KEY)"
          TARGET_HETZNER_USER="$(resolve_env_secret "${TARGET_ENVIRONMENT}" HETZNER_USER)"
          UI_SESSION_CONTEXT_JSON="$(resolve_env_secret "${TARGET_ENVIRONMENT}" UI_SESSION_CONTEXT_JSON)"
          UI_LOGIN_USERS_JSON="$(resolve_env_secret "${TARGET_ENVIRONMENT}" UI_LOGIN_USERS_JSON)"
          OWNER_PRINCIPAL_ID="$(resolve_env_secret "${TARGET_ENVIRONMENT}" OWNER_PRINCIPAL_ID)"
          TENANT_ADMIN_TOKEN="$(resolve_env_secret "${TARGET_ENVIRONMENT}" TENANT_ADMIN_TOKEN)"
          CUSTOMER_CASES_API_SECRET="$(resolve_env_secret "${TARGET_ENVIRONMENT}" CUSTOMER_CASES_API_SECRET)"

          if [ -n "${OWNER_PRINCIPAL_ID_INPUT}" ]; then
            OWNER_PRINCIPAL_ID="${OWNER_PRINCIPAL_ID_INPUT}"
            UI_SESSION_CONTEXT_JSON=""
          fi

          if [ "${SCAS_UI_AUTH_MODE_TARGET}" = "required" ] \
            && [ -z "${UI_SESSION_CONTEXT_JSON}" ] \
            && [ -n "${OWNER_PRINCIPAL_ID}" ]; then
            if [[ ! "${OWNER_PRINCIPAL_ID}" =~ ^[a-z][a-z0-9-]*$ ]]; then
              echo "::error::Owner principal id must be a non-secret stable id, not an email address."
              exit 1
            fi
            UI_SESSION_CONTEXT_JSON="$(
              TENANT_ID="${TENANT_ID}" OWNER_PRINCIPAL_ID="${OWNER_PRINCIPAL_ID}" python3 - <<'PY'
          import json
          import os

          tenant_id = os.environ["TENANT_ID"]
          owner_principal_id = os.environ["OWNER_PRINCIPAL_ID"]
          print(
              json.dumps(
                  {
                      "tenant_id": tenant_id,
                      "principal_id": owner_principal_id,
                      "membership_id": f"tm-{tenant_id}-initial-owner",
                      "role_ids": [f"{tenant_id}-owner"],
                  },
                  separators=(",", ":"),
              )
          )
          PY
            )"
          fi

          missing=0
          required_names=(TARGET_HETZNER_HOST TARGET_HETZNER_SSH_KEY TARGET_HETZNER_USER TENANT_ADMIN_TOKEN)
          if [ "${SCAS_UI_AUTH_MODE_TARGET}" = "required" ]; then
            required_names+=(UI_SESSION_CONTEXT_JSON)
          else
            required_names+=(UI_LOGIN_USERS_JSON)
          fi
          if [ "${TENANT_ID}" = "daskuechenhaus" ]; then
            required_names+=(CUSTOMER_CASES_API_SECRET)
            if [ -z "${CUSTOMER_CASES_API_URL}" ]; then
              echo "::error::customer_cases_api_url is required for daskuechenhaus deploys."
              missing=1
            fi
          fi
          for name in "${required_names[@]}"
          do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required ${TARGET_ENVIRONMENT} secret: ${name#TARGET_}"
              missing=1
            fi
          done
          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

          UI_SESSION_CONTEXT_JSON_B64="$(printf '%s' "${UI_SESSION_CONTEXT_JSON}" | base64 -w0)"
          UI_LOGIN_USERS_JSON_B64="$(printf '%s' "${UI_LOGIN_USERS_JSON}" | base64 -w0)"
          TENANT_ADMIN_TOKEN_B64="$(printf '%s' "${TENANT_ADMIN_TOKEN}" | base64 -w0)"
          CUSTOMER_CASES_API_SECRET_B64="$(printf '%s' "${CUSTOMER_CASES_API_SECRET}" | base64 -w0)"
          for secret_value in \
            "${UI_SESSION_CONTEXT_JSON}" \
            "${UI_SESSION_CONTEXT_JSON_B64}" \
            "${UI_LOGIN_USERS_JSON}" \
            "${UI_LOGIN_USERS_JSON_B64}" \
            "${TENANT_ADMIN_TOKEN_B64}" \
            "${CUSTOMER_CASES_API_SECRET_B64}"
          do
            if [ -n "${secret_value}" ]; then
              echo "::add-mask::${secret_value}"
            fi
          done

          {
            printf 'TARGET_HETZNER_HOST=%s\n' "${TARGET_HETZNER_HOST}"
            printf 'TARGET_HETZNER_USER=%s\n' "${TARGET_HETZNER_USER}"
            printf 'UI_SESSION_CONTEXT_JSON_B64=%s\n' "${UI_SESSION_CONTEXT_JSON_B64}"
            printf 'UI_LOGIN_USERS_JSON_B64=%s\n' "${UI_LOGIN_USERS_JSON_B64}"
            printf 'TENANT_ADMIN_TOKEN_B64=%s\n' "${TENANT_ADMIN_TOKEN_B64}"
            printf 'CUSTOMER_CASES_API_SECRET_B64=%s\n' "${CUSTOMER_CASES_API_SECRET_B64}"
            echo 'TARGET_HETZNER_SSH_KEY<<__SCAS_HETZNER_SSH_KEY__'
            printf '%s\n' "${TARGET_HETZNER_SSH_KEY}"
            echo '__SCAS_HETZNER_SSH_KEY__'
          } >> "${GITHUB_ENV}"

      - name: Configure SSH
        if: env.APPLY_DEPLOY == 'true'
        shell: bash
        run: |
          set -euo pipefail

          install -m 700 -d "${HOME}/.ssh"
          printf '%s\n' "${TARGET_HETZNER_SSH_KEY}" | tr -d '\r' > "${HOME}/.ssh/hetzner_key"
          chmod 600 "${HOME}/.ssh/hetzner_key"

          if ! ssh-keygen -y -f "${HOME}/.ssh/hetzner_key" >/dev/null; then
            echo "::error::HETZNER_SSH_KEY must contain the complete private OpenSSH key block."
            echo "::error::The configured key is missing the expected OpenSSH private key header."
            exit 1
          fi

          ssh-keyscan -H "${TARGET_HETZNER_HOST}" >> "${HOME}/.ssh/known_hosts"

      - name: Create Cloudflare Origin certificate
        if: env.APPLY_DEPLOY == 'true' && env.MANAGE_REVERSE_PROXY == 'true'
        shell: bash
        run: |
          set -euo pipefail

          case "${TENANT_ID}" in
            liquisto)
              cf_api_token="${LIQUISTO_CLOUDFLARE_API_TOKEN:-}"
              ;;
            tenant_kinderhaus)
              cf_api_token="${KHH_CLOUDFLARE_API_TOKEN:-}"
              ;;
            *)
              cf_api_token=""
              ;;
          esac

          if [ -z "${cf_api_token}" ]; then
            echo "::warning::Missing Cloudflare API token for tenant ${TENANT_ID}; skipping origin certificate creation."
            echo "::warning::Reverse proxy deployment will continue only if an existing certificate is present on the target host."
            exit 0
          fi

          cert_hostnames=("${REVERSE_PROXY_CERT_HOSTNAME}")
          if [ "${TENANT_ID}" = "liquisto" ] && [ "${REVERSE_PROXY_CERT_HOSTNAME}" = "liquisto.cloud" ]; then
            cert_hostnames+=("www.${REVERSE_PROXY_CERT_HOSTNAME}")
          fi
          if [ "${TENANT_ID}" = "tenant_kinderhaus" ] && [ "${REVERSE_PROXY_CERT_HOSTNAME}" = "kinderhaus-heuschrecken.cloud" ]; then
            cert_hostnames+=("www.${REVERSE_PROXY_CERT_HOSTNAME}")
          fi
          subject_alt_name=""
          for cert_hostname in "${cert_hostnames[@]}"; do
            if [ -n "${subject_alt_name}" ]; then
              subject_alt_name+=","
            fi
            subject_alt_name+="DNS:${cert_hostname}"
          done

          mkdir -p tenant-ui-origin-cert
          openssl req \
            -new \
            -newkey rsa:2048 \
            -nodes \
            -keyout tenant-ui-origin-cert/origin.key \
            -out tenant-ui-origin-cert/origin.csr \
            -subj "/CN=${REVERSE_PROXY_CERT_HOSTNAME}" \
            -addext "subjectAltName=${subject_alt_name}" >/dev/null 2>&1

          CLOUDFLARE_API_TOKEN="${cf_api_token}" \
          ORIGIN_CERT_HOSTNAMES="${cert_hostnames[*]}" \
          python3 - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request
          from pathlib import Path

          token = os.environ["CLOUDFLARE_API_TOKEN"]
          hostnames = os.environ["ORIGIN_CERT_HOSTNAMES"].split()
          csr = Path("tenant-ui-origin-cert/origin.csr").read_text(encoding="utf-8")
          payload = {
              "csr": csr,
              "hostnames": hostnames,
              "request_type": "origin-rsa",
              "requested_validity": 5475,
          }
          request = urllib.request.Request(
              "https://api.cloudflare.com/client/v4/certificates",
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json",
              },
              method="POST",
          )
          try:
              with urllib.request.urlopen(request, timeout=30) as response:
                  body = json.loads(response.read().decode("utf-8"))
          except urllib.error.HTTPError as exc:
              detail = exc.read().decode("utf-8", errors="replace")
              raise SystemExit(
                  f"Cloudflare Origin CA certificate creation failed: {detail}"
              ) from exc
          if not body.get("success", False):
              raise SystemExit(f"Cloudflare Origin CA certificate creation failed: {body}")
          Path("tenant-ui-origin-cert/origin.pem").write_text(
              body["result"]["certificate"],
              encoding="utf-8",
          )
          PY

      - name: Upload image to target host
        if: env.APPLY_DEPLOY == 'true'
        shell: bash
        run: |
          set -euo pipefail

          scp \
            -i "${HOME}/.ssh/hetzner_key" \
            -o BatchMode=yes \
            -o ConnectTimeout=10 \
            "${SCAS_UI_IMAGE_ARCHIVE}" \
            "${TARGET_HETZNER_USER}@${TARGET_HETZNER_HOST}:/tmp/scas-tenant-ui-${GITHUB_RUN_ID}.tar.gz"
          if [ "${MANAGE_REVERSE_PROXY}" = "true" ]; then
            if [ -f tenant-ui-origin-cert/origin.pem ] && [ -f tenant-ui-origin-cert/origin.key ]; then
              scp \
                -i "${HOME}/.ssh/hetzner_key" \
                -o BatchMode=yes \
                -o ConnectTimeout=10 \
                tenant-ui-origin-cert/origin.pem \
                "${TARGET_HETZNER_USER}@${TARGET_HETZNER_HOST}:/tmp/scas-tenant-ui-origin-${GITHUB_RUN_ID}.pem"
              scp \
                -i "${HOME}/.ssh/hetzner_key" \
                -o BatchMode=yes \
                -o ConnectTimeout=10 \
                tenant-ui-origin-cert/origin.key \
                "${TARGET_HETZNER_USER}@${TARGET_HETZNER_HOST}:/tmp/scas-tenant-ui-origin-${GITHUB_RUN_ID}.key"
            else
              echo "::notice::No generated origin certificate was uploaded; target host must already have a certificate for ${REVERSE_PROXY_CERT_HOSTNAME}."
            fi
          fi

      - name: Deploy image with rollback guard
        if: env.APPLY_DEPLOY == 'true'
        shell: bash
        run: |
          set -euo pipefail

          ssh \
            -i "${HOME}/.ssh/hetzner_key" \
            -o BatchMode=yes \
            -o ConnectTimeout=10 \
            "${TARGET_HETZNER_USER}@${TARGET_HETZNER_HOST}" \
            "TARGET_ENVIRONMENT='${TARGET_ENVIRONMENT}' TENANT_ID='${TENANT_ID}' TENANT_HOSTNAME='${TENANT_HOSTNAME}' CONTROL_API_URL='${CONTROL_API_URL}' CUSTOMER_CASES_API_URL='${CUSTOMER_CASES_API_URL}' SCAS_UI_IMAGE='${SCAS_UI_IMAGE}' COMPOSE_PROJECT='${COMPOSE_PROJECT}' REMOTE_OVERRIDE_PATH='${REMOTE_OVERRIDE_PATH}' SERVICE_NAME='${SERVICE_NAME}' UI_APP='${UI_APP}' SCAS_UI_CONTAINER_PORT='${SCAS_UI_CONTAINER_PORT}' SCAS_UI_HEALTH_PATH='${SCAS_UI_HEALTH_PATH}' LOCAL_HEALTH_PORT='${LOCAL_HEALTH_PORT}' SCAS_UI_AUTH_MODE_TARGET='${SCAS_UI_AUTH_MODE_TARGET}' UI_SESSION_CONTEXT_JSON_B64='${UI_SESSION_CONTEXT_JSON_B64}' UI_LOGIN_USERS_JSON_B64='${UI_LOGIN_USERS_JSON_B64}' TENANT_ADMIN_TOKEN_B64='${TENANT_ADMIN_TOKEN_B64}' CUSTOMER_CASES_API_SECRET_B64='${CUSTOMER_CASES_API_SECRET_B64}' GITHUB_RUN_ID='${GITHUB_RUN_ID}' UPSTREAM_AUTH_EVIDENCE_URL='${UPSTREAM_AUTH_EVIDENCE_URL}' SCAS_UI_LOGIN_URL='${SCAS_UI_LOGIN_URL}' MANAGE_REVERSE_PROXY='${MANAGE_REVERSE_PROXY}' REVERSE_PROXY_CONFIG_PATH='${REVERSE_PROXY_CONFIG_PATH}' REVERSE_PROXY_CERT_HOSTNAME='${REVERSE_PROXY_CERT_HOSTNAME}' REMOTE_ORIGIN_CERT='/tmp/scas-tenant-ui-origin-${GITHUB_RUN_ID}.pem' REMOTE_ORIGIN_KEY='/tmp/scas-tenant-ui-origin-${GITHUB_RUN_ID}.key' bash -s" <<'REMOTE'
          set -euo pipefail

          sudo_if_needed() {
            if [ "$(id -u)" -eq 0 ]; then
              "$@"
            else
              sudo "$@"
            fi
          }

          remote_dir="$(dirname "${REMOTE_OVERRIDE_PATH}")"
          evidence_dir="/tmp/scas-tenant-ui-deploy-${GITHUB_RUN_ID}"
          image_archive="/tmp/scas-tenant-ui-${GITHUB_RUN_ID}.tar.gz"
          env_file="${remote_dir}/scas-tenant-ui.env"
          previous_image=""

          install -d -m 700 "${evidence_dir}"
          service_id="$(
            docker ps \
              --filter "label=com.docker.compose.project=${COMPOSE_PROJECT}" \
              --filter "label=com.docker.compose.service=${SERVICE_NAME}" \
              --format '{{.ID}}' \
              | head -n 1 || true
          )"
          if [ -n "${service_id}" ]; then
            previous_image="$(docker inspect --format '{{.Config.Image}}' "${service_id}" 2>/dev/null || true)"
          fi

          gzip -dc "${image_archive}" | docker load

          install -d -m 750 "${remote_dir}"
          {
            printf 'SCAS_UI_AUTH_MODE=%s\n' "${SCAS_UI_AUTH_MODE_TARGET}"
            printf 'SCAS_UI_TENANT_ID=%s\n' "${TENANT_ID}"
            if [ "${SCAS_UI_AUTH_MODE_TARGET}" = "required" ]; then
              printf 'SCAS_UI_UPSTREAM_AUTH_TRUSTED=true\n'
              printf 'SCAS_UI_SESSION_CONTEXT_JSON=%s\n' "$(printf '%s' "${UI_SESSION_CONTEXT_JSON_B64}" | base64 -d)"
            else
              printf 'SCAS_UI_LOGIN_USERS_JSON=%s\n' "$(printf '%s' "${UI_LOGIN_USERS_JSON_B64}" | base64 -d)"
            fi
            if [ -n "${SCAS_UI_LOGIN_URL}" ]; then
              printf 'SCAS_UI_LOGIN_URL=%s\n' "${SCAS_UI_LOGIN_URL}"
            fi
            printf 'SCAS_CONTROL_API_URL=%s\n' "${CONTROL_API_URL}"
            printf 'SCAS_TENANT_ADMIN_TOKEN=%s\n' "$(printf '%s' "${TENANT_ADMIN_TOKEN_B64}" | base64 -d)"
            if [ -n "${CUSTOMER_CASES_API_URL}" ]; then
              printf 'SCAS_CUSTOMER_CASES_API_URL=%s\n' "${CUSTOMER_CASES_API_URL}"
              printf 'SCAS_CUSTOMER_CASES_API_SECRET=%s\n' "$(printf '%s' "${CUSTOMER_CASES_API_SECRET_B64}" | base64 -d)"
            fi
          } > "${env_file}"
          chmod 600 "${env_file}"

          ui_environment='
                HOSTNAME: "0.0.0.0"
                PORT: "3000"'

          cat > "${REMOTE_OVERRIDE_PATH}" <<EOF
          services:
            ${SERVICE_NAME}:
              image: ${SCAS_UI_IMAGE}
              env_file:
                - ${env_file}
              environment:
          ${ui_environment}
              ports:
                - "127.0.0.1:${LOCAL_HEALTH_PORT}:${SCAS_UI_CONTAINER_PORT}"
              restart: unless-stopped
          EOF

          docker compose \
            -p "${COMPOSE_PROJECT}" \
            -f "${REMOTE_OVERRIDE_PATH}" \
            up -d "${SERVICE_NAME}"

          health_url="http://127.0.0.1:${LOCAL_HEALTH_PORT}${SCAS_UI_HEALTH_PATH}"
          expected_content_marker=""
          forbidden_content_marker=""
          if [ "${UI_APP}" = "liquisto-workbench" ]; then
            expected_content_marker="Liquisto workspace"
            forbidden_content_marker="daskuechenhaus"
          fi
          if [ "${UI_APP}" = "khh-workbench" ]; then
            expected_content_marker="Leitungs-Cockpit"
            forbidden_content_marker="liquisto"
          fi
          health_passed=0
          for attempt in $(seq 1 30); do
            if curl -fsS --max-time 10 "${health_url}" >/dev/null; then
              health_passed=1
              break
            fi
            echo "Waiting for tenant UI health check (${attempt}/30)." >&2
            sleep 3
          done

          if [ "${health_passed}" -ne 1 ]; then
            echo "Post-deploy health check failed." >&2
            if [ -n "${previous_image}" ]; then
              sed -i "s|image: ${SCAS_UI_IMAGE}|image: ${previous_image}|" "${REMOTE_OVERRIDE_PATH}"
              docker compose \
                -p "${COMPOSE_PROJECT}" \
                -f "${REMOTE_OVERRIDE_PATH}" \
                up -d "${SERVICE_NAME}"
              echo "Rolled back to previous image ${previous_image}." >&2
            fi
            exit 1
          fi

          if [ -n "${expected_content_marker}" ]; then
            container_body="$(mktemp)"
            curl -fsS --max-time 10 "${health_url}" -o "${container_body}"
            if ! grep -Fq "${expected_content_marker}" "${container_body}"; then
              rm -f "${container_body}"
              echo "Post-deploy content check failed: expected marker was not served by the tenant UI container." >&2
              if [ -n "${previous_image}" ]; then
                sed -i "s|image: ${SCAS_UI_IMAGE}|image: ${previous_image}|" "${REMOTE_OVERRIDE_PATH}"
                docker compose \
                  -p "${COMPOSE_PROJECT}" \
                  -f "${REMOTE_OVERRIDE_PATH}" \
                  up -d "${SERVICE_NAME}"
                echo "Rolled back to previous image ${previous_image}." >&2
              fi
              exit 1
            fi
            if [ -n "${forbidden_content_marker}" ] && grep -Fiq "${forbidden_content_marker}" "${container_body}"; then
              rm -f "${container_body}"
              echo "Post-deploy content check failed: forbidden cross-tenant marker was served by the tenant UI container." >&2
              if [ -n "${previous_image}" ]; then
                sed -i "s|image: ${SCAS_UI_IMAGE}|image: ${previous_image}|" "${REMOTE_OVERRIDE_PATH}"
                docker compose \
                  -p "${COMPOSE_PROJECT}" \
                  -f "${REMOTE_OVERRIDE_PATH}" \
                  up -d "${SERVICE_NAME}"
                echo "Rolled back to previous image ${previous_image}." >&2
              fi
              exit 1
            fi
            rm -f "${container_body}"
          fi

          reverse_proxy_status="not managed"
          if [ "${MANAGE_REVERSE_PROXY}" = "true" ]; then
            reverse_proxy_server_names="${TENANT_HOSTNAME}"
            if [ "${TENANT_ID}" = "liquisto" ] && [ "${TENANT_HOSTNAME}" = "liquisto.cloud" ]; then
              reverse_proxy_server_names="${TENANT_HOSTNAME} www.${TENANT_HOSTNAME}"
            fi
            if [ "${TENANT_ID}" = "tenant_kinderhaus" ] && [ "${TENANT_HOSTNAME}" = "kinderhaus-heuschrecken.cloud" ]; then
              reverse_proxy_server_names="${TENANT_HOSTNAME} www.${TENANT_HOSTNAME}"
            fi
            nginx_site="${REVERSE_PROXY_CONFIG_PATH}"
            nginx_enabled="/etc/nginx/sites-enabled/$(basename "${nginx_site}")"
            cert_dir="/etc/letsencrypt/live/${REVERSE_PROXY_CERT_HOSTNAME}"
            origin_cert_dir="/etc/ssl/cloudflare"
            origin_cert_file="${origin_cert_dir}/${TENANT_ID}-origin.pem"
            origin_key_file="${origin_cert_dir}/${TENANT_ID}-origin.key"
            nginx_candidate="${evidence_dir}/nginx-site.conf"
            nginx_backup="${evidence_dir}/nginx-site.previous"

            if [ ! -f "${cert_dir}/fullchain.pem" ] || [ ! -f "${cert_dir}/privkey.pem" ]; then
              if [ ! -f "${REMOTE_ORIGIN_CERT}" ] || [ ! -f "${REMOTE_ORIGIN_KEY}" ]; then
                echo "Origin certificate files are missing for ${REVERSE_PROXY_CERT_HOSTNAME}." >&2
                exit 1
              fi
              sudo_if_needed install -d -o root -g root -m 0755 "${origin_cert_dir}"
              sudo_if_needed install -o root -g root -m 0644 "${REMOTE_ORIGIN_CERT}" "${origin_cert_file}"
              sudo_if_needed install -o root -g root -m 0600 "${REMOTE_ORIGIN_KEY}" "${origin_key_file}"
              cert_file="${origin_cert_file}"
              key_file="${origin_key_file}"
            else
              cert_file="${cert_dir}/fullchain.pem"
              key_file="${cert_dir}/privkey.pem"
            fi

            cat > "${nginx_candidate}" <<EOF
          server {
              listen 80;
              server_name ${reverse_proxy_server_names};

              return 301 https://\$host\$request_uri;
          }

          server {
              listen 443 ssl http2;
              server_name ${reverse_proxy_server_names};

              ssl_certificate ${cert_file};
              ssl_certificate_key ${key_file};

              location / {
                  proxy_pass http://127.0.0.1:${LOCAL_HEALTH_PORT};
                  proxy_http_version 1.1;
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto \$scheme;
                  proxy_set_header Upgrade \$http_upgrade;
                  proxy_set_header Connection "upgrade";
                  proxy_read_timeout 86400;
              }
          }
          EOF

            if [ -f "${nginx_site}" ]; then
              sudo_if_needed cp "${nginx_site}" "${nginx_backup}"
            fi

            sudo_if_needed install -m 644 "${nginx_candidate}" "${nginx_site}"
            sudo_if_needed ln -sfn "${nginx_site}" "${nginx_enabled}"

            if ! sudo_if_needed nginx -t; then
              if [ -f "${nginx_backup}" ]; then
                sudo_if_needed install -m 644 "${nginx_backup}" "${nginx_site}"
              else
                sudo_if_needed rm -f "${nginx_site}"
                if [ -L "${nginx_enabled}" ]; then
                  sudo_if_needed rm -f "${nginx_enabled}"
                fi
              fi
              sudo_if_needed nginx -t || true
              echo "Nginx configuration failed validation; restored previous state." >&2
              exit 1
            fi

            if ! sudo_if_needed systemctl reload nginx; then
              if ! sudo_if_needed nginx -s reload; then
                sudo_if_needed systemctl start nginx
              fi
            fi
            for reverse_proxy_hostname in ${reverse_proxy_server_names}; do
              curl -kfsS \
                --resolve "${reverse_proxy_hostname}:443:127.0.0.1" \
                --max-time 10 \
                "https://${reverse_proxy_hostname}${SCAS_UI_HEALTH_PATH}" >/dev/null
              if [ -n "${expected_content_marker}" ]; then
                origin_body="$(mktemp)"
                curl -kfsS \
                  --resolve "${reverse_proxy_hostname}:443:127.0.0.1" \
                  --max-time 10 \
                  "https://${reverse_proxy_hostname}${SCAS_UI_HEALTH_PATH}" \
                  -o "${origin_body}"
                grep -Fq "${expected_content_marker}" "${origin_body}"
                if [ -n "${forbidden_content_marker}" ] && grep -Fiq "${forbidden_content_marker}" "${origin_body}"; then
                  rm -f "${origin_body}"
                  echo "Reverse proxy content check failed: forbidden cross-tenant marker was served by the tenant route." >&2
                  exit 1
                fi
                rm -f "${origin_body}"
              fi
            done
            reverse_proxy_status="managed ${nginx_site} -> 127.0.0.1:${LOCAL_HEALTH_PORT}"
          fi

          {
            printf '# Tenant UI Deployment Evidence\n\n'
            printf -- '- Target environment: `%s`\n' "${TARGET_ENVIRONMENT}"
            printf -- '- Tenant ID: `%s`\n' "${TENANT_ID}"
            printf -- '- Hostname: `%s`\n' "${TENANT_HOSTNAME}"
            printf -- '- Reverse proxy server names: `%s`\n' "${reverse_proxy_server_names:-not-managed}"
            printf -- '- Image: `%s`\n' "${SCAS_UI_IMAGE}"
            printf -- '- UI app: `%s`\n' "${UI_APP}"
            printf -- '- Previous image: `%s`\n' "${previous_image:-unknown}"
            printf -- '- Compose project: `%s`\n' "${COMPOSE_PROJECT}"
            printf -- '- Auth mode: `%s`\n' "${SCAS_UI_AUTH_MODE_TARGET}"
            printf -- '- Customer cases API: `%s`\n' "$([ -n "${CUSTOMER_CASES_API_URL}" ] && printf configured || printf not-configured)"
            printf -- '- Deployment mode: `SCAS-managed compose file; legacy compose files and .env are not read`\n'
            printf -- '- Compose file: `%s`\n' "${REMOTE_OVERRIDE_PATH}"
            printf -- '- Reverse proxy: `%s`\n' "${reverse_proxy_status}"
            printf -- '- Health path: `%s`\n' "${SCAS_UI_HEALTH_PATH}"
            printf -- '- Origin certificate: `%s`\n' "${cert_file:-not-managed}"
            printf -- '- Expected content marker: `%s`\n' "${expected_content_marker:-not-required}"
            printf -- '- Forbidden content marker: `%s`\n' "${forbidden_content_marker:-not-required}"
            printf -- '- Upstream auth evidence: `%s`\n' "${UPSTREAM_AUTH_EVIDENCE_URL}"
            printf -- '- Health check: `passed`\n'
            printf -- '- Collected at: `%s`\n' "$(date -Is)"
          } > "${evidence_dir}/deployment.md"

          rm -f "${image_archive}" "${REMOTE_ORIGIN_CERT:-}" "${REMOTE_ORIGIN_KEY:-}"
          REMOTE

      - name: Sync Cloudflare DNS to deployment host
        if: env.APPLY_DEPLOY == 'true' && env.SYNC_CLOUDFLARE_DNS == 'true'
        shell: bash
        run: |
          set -euo pipefail

          case "${TENANT_ID}" in
            liquisto)
              tenant_cloudflare_api_token="${LIQUISTO_CLOUDFLARE_API_TOKEN:-}"
              tenant_cloudflare_zone_id="${LIQUISTO_CLOUDFLARE_ZONE_ID:-}"
              ;;
            tenant_kinderhaus)
              tenant_cloudflare_api_token="${KHH_CLOUDFLARE_API_TOKEN:-}"
              tenant_cloudflare_zone_id="${KHH_CLOUDFLARE_ZONE_ID:-}"
              ;;
            *)
              echo "::error::Cloudflare DNS sync is not configured for ${TENANT_ID}."
              exit 1
              ;;
          esac

          if [ -z "${tenant_cloudflare_api_token}" ]; then
            echo "::error::Missing Cloudflare API token for ${TENANT_ID}."
            exit 1
          fi
          if [ -z "${tenant_cloudflare_zone_id}" ]; then
            echo "::error::Missing Cloudflare zone id for ${TENANT_ID}."
            exit 1
          fi

          deploy_origin_ipv4="$(
            TARGET_HETZNER_HOST="${TARGET_HETZNER_HOST}" python3 - <<'PY'
          import ipaddress
          import os
          import socket

          host = os.environ["TARGET_HETZNER_HOST"]
          candidates = socket.getaddrinfo(host, 443, socket.AF_INET, socket.SOCK_STREAM)
          if not candidates:
              raise SystemExit("Deployment host did not resolve to an IPv4 address.")
          print(str(ipaddress.ip_address(candidates[0][4][0])))
          PY
          )"
          echo "::add-mask::${deploy_origin_ipv4}"

          CLOUDFLARE_API_TOKEN="${tenant_cloudflare_api_token}" \
          CLOUDFLARE_ZONE_ID="${tenant_cloudflare_zone_id}" \
          DEPLOY_ORIGIN_IPV4="${deploy_origin_ipv4}" \
          python3 - <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request

          token = os.environ["CLOUDFLARE_API_TOKEN"]
          zone_id = os.environ["CLOUDFLARE_ZONE_ID"]
          hostname = os.environ["TENANT_HOSTNAME"]
          origin_ipv4 = os.environ["DEPLOY_ORIGIN_IPV4"]
          base_url = "https://api.cloudflare.com/client/v4"

          def cloudflare(path: str, method: str = "GET", payload: dict | None = None) -> dict:
              data = None
              headers = {"Authorization": f"Bearer {token}"}
              if payload is not None:
                  data = json.dumps(payload).encode("utf-8")
                  headers["Content-Type"] = "application/json"
              request = urllib.request.Request(
                  f"{base_url}{path}",
                  data=data,
                  headers=headers,
                  method=method,
              )
              with urllib.request.urlopen(request, timeout=30) as response:
                  body = json.loads(response.read().decode("utf-8"))
              if not body.get("success"):
                  raise RuntimeError(f"Cloudflare API request failed for {method} {path}.")
              return body

          def list_records(record_type: str, name: str) -> list[dict]:
              encoded_name = urllib.parse.quote(name, safe="")
              payload = cloudflare(
                  f"/zones/{zone_id}/dns_records?type={record_type}&name={encoded_name}&per_page=100"
              )
              return list(payload.get("result", []))

          def upsert(record_type: str, name: str, content: str) -> None:
              desired = {
                  "type": record_type,
                  "name": name,
                  "content": content,
                  "ttl": 1,
                  "proxied": True,
              }
              records = list_records(record_type, name)
              if not records:
                  cloudflare(f"/zones/{zone_id}/dns_records", method="POST", payload=desired)
                  return
              cloudflare(
                  f"/zones/{zone_id}/dns_records/{records[0]['id']}",
                  method="PUT",
                  payload=desired,
              )
              for extra in records[1:]:
                  cloudflare(f"/zones/{zone_id}/dns_records/{extra['id']}", method="DELETE")

          upsert("A", hostname, origin_ipv4)
          upsert("CNAME", f"www.{hostname}", hostname)
          print(
              json.dumps(
                  {
                      "hostname": hostname,
                      "apex_a_record": "synced-to-deployment-host",
                      "www_cname_record": "synced-to-apex",
                      "origin_content_printed": False,
                  },
                  sort_keys=True,
              )
          )
          PY

      - name: Verify public tenant UI content
        if: env.APPLY_DEPLOY == 'true'
        shell: bash
        run: |
          set -euo pipefail

          expected_content_marker=""
          forbidden_content_marker=""
          if [ "${UI_APP}" = "liquisto-workbench" ]; then
            expected_content_marker="Liquisto workspace"
            forbidden_content_marker="daskuechenhaus"
          fi
          if [ "${UI_APP}" = "khh-workbench" ]; then
            expected_content_marker="Leitungs-Cockpit"
            forbidden_content_marker="liquisto"
          fi

          public_url="https://${TENANT_HOSTNAME}${SCAS_UI_HEALTH_PATH}"
          public_urls=("${public_url}")
          if [ "${TENANT_ID}" = "liquisto" ] && [ "${TENANT_HOSTNAME}" = "liquisto.cloud" ]; then
            public_urls+=("https://www.${TENANT_HOSTNAME}${SCAS_UI_HEALTH_PATH}")
          fi
          if [ "${TENANT_ID}" = "tenant_kinderhaus" ] && [ "${TENANT_HOSTNAME}" = "kinderhaus-heuschrecken.cloud" ]; then
            public_urls+=("https://www.${TENANT_HOSTNAME}${SCAS_UI_HEALTH_PATH}")
          fi

          for public_url in "${public_urls[@]}"; do
            public_check_passed=0
            for attempt in $(seq 1 30); do
              if [ "${TENANT_ID}" = "liquisto" ] && [ "${TENANT_HOSTNAME}" = "liquisto.cloud" ]; then
                status="$(curl -sS -o /dev/null -w '%{http_code}' --max-time 15 "${public_url}")"
                location="$(curl -sS -I --max-time 15 "${public_url}" | awk 'BEGIN{IGNORECASE=1} /^location:/ {sub(/\r$/, ""); print $0; exit}')"
                if { [ "${status}" = "302" ] || [ "${status}" = "303" ] || [ "${status}" = "403" ]; } && { [ "${status}" = "403" ] || [[ "${location}" == *"cloudflareaccess.com"* || "${location}" == *"/cdn-cgi/access/login/"* ]]; }; then
                  public_check_passed=1
                  break
                fi
                echo "Waiting for Cloudflare Access public check for ${public_url} (${attempt}/30), got HTTP ${status}." >&2
                sleep 5
                continue
              fi

              public_body="$(mktemp)"
              if curl -fsS --max-time 15 "${public_url}" -o "${public_body}"; then
                if [ -z "${expected_content_marker}" ] || grep -Fq "${expected_content_marker}" "${public_body}"; then
                  if [ -n "${forbidden_content_marker}" ] && grep -Fiq "${forbidden_content_marker}" "${public_body}"; then
                    echo "Public tenant UI content check found a forbidden cross-tenant marker for ${public_url}." >&2
                  else
                    public_check_passed=1
                    rm -f "${public_body}"
                    break
                  fi
                fi
              fi
              rm -f "${public_body}"
              echo "Waiting for public tenant UI content check for ${public_url} (${attempt}/30)." >&2
              sleep 5
            done

            if [ "${public_check_passed}" -ne 1 ]; then
              echo "::error::Public tenant UI content check failed for ${public_url}."
              exit 1
            fi
          done

      - name: Download deployment evidence
        if: env.APPLY_DEPLOY == 'true'
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p tenant-ui-deploy-evidence
          scp \
            -i "${HOME}/.ssh/hetzner_key" \
            -o BatchMode=yes \
            -o ConnectTimeout=10 \
            "${TARGET_HETZNER_USER}@${TARGET_HETZNER_HOST}:/tmp/scas-tenant-ui-deploy-${GITHUB_RUN_ID}/deployment.md" \
            tenant-ui-deploy-evidence/deployment.md

      - name: Upload deployment evidence
        if: env.APPLY_DEPLOY == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tenant-ui-deployment-evidence-${{ inputs.target_environment }}
          path: tenant-ui-deploy-evidence/deployment.md
          if-no-files-found: error
