name: es-daskuechenhaus.de CRM Release Cleanup

on:
  workflow_dispatch:
    inputs:
      keep_releases:
        description: Number of newest CRM releases to keep
        required: true
        type: string
        default: "3"
      apply_cleanup:
        description: Delete old release directories
        required: true
        type: boolean
        default: false
      confirm_production:
        description: Required true when apply_cleanup=true
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: es-daskuechenhaus-crm-release-cleanup
  cancel-in-progress: false

jobs:
  cleanup:
    name: Clean old DKH CRM releases
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
    env:
      KEEP_RELEASES: ${{ inputs.keep_releases }}
      APPLY_CLEANUP: ${{ inputs.apply_cleanup }}
      CONFIRM_PRODUCTION: ${{ inputs.confirm_production }}
      HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
      HETZNER_USER: ${{ secrets.HETZNER_USER }}
      HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
      SCAS_PROD_HETZNER_HOST: ${{ secrets.SCAS_PROD_HETZNER_HOST }}
      SCAS_PROD_HETZNER_USER: ${{ secrets.SCAS_PROD_HETZNER_USER }}
      SCAS_PROD_HETZNER_SSH_KEY: ${{ secrets.SCAS_PROD_HETZNER_SSH_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate cleanup inputs
        shell: bash
        run: |
          set -euo pipefail

          missing=0
          if [[ ! "${KEEP_RELEASES}" =~ ^[0-9]+$ ]] || [ "${KEEP_RELEASES}" -lt 1 ]; then
            echo "::error::keep_releases must be a positive integer."
            missing=1
          fi
          if [ "${APPLY_CLEANUP}" = "true" ] && [ "${CONFIRM_PRODUCTION}" != "true" ]; then
            echo "::error::confirm_production must be true when apply_cleanup=true."
            missing=1
          fi

          target_host="${SCAS_PROD_HETZNER_HOST:-${HETZNER_HOST:-}}"
          target_user="${SCAS_PROD_HETZNER_USER:-${HETZNER_USER:-}}"
          target_key="${SCAS_PROD_HETZNER_SSH_KEY:-${HETZNER_SSH_KEY:-}}"
          for pair in \
            "TARGET_HETZNER_HOST:${target_host}" \
            "TARGET_HETZNER_USER:${target_user}" \
            "TARGET_HETZNER_SSH_KEY:${target_key}"
          do
            name="${pair%%:*}"
            value="${pair#*:}"
            if [ -z "${value}" ]; then
              echo "::error::Missing required Hetzner secret: ${name}"
              missing=1
            fi
          done

          {
            printf 'TARGET_HETZNER_HOST=%s\n' "${target_host}"
            printf 'TARGET_HETZNER_USER=%s\n' "${target_user}"
            echo 'TARGET_HETZNER_SSH_KEY<<__SCAS_HETZNER_SSH_KEY__'
            printf '%s\n' "${target_key}"
            echo '__SCAS_HETZNER_SSH_KEY__'
          } >> "${GITHUB_ENV}"

          exit "${missing}"

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail

          install -m 700 -d "${HOME}/.ssh"
          printf '%s\n' "${TARGET_HETZNER_SSH_KEY}" | tr -d '\r' > "${HOME}/.ssh/hetzner_key"
          chmod 600 "${HOME}/.ssh/hetzner_key"

          if ! ssh-keygen -y -f "${HOME}/.ssh/hetzner_key" >/dev/null; then
            echo "::error::TARGET_HETZNER_SSH_KEY must contain the complete private OpenSSH key block."
            exit 1
          fi

          ssh-keyscan -H "${TARGET_HETZNER_HOST}" >> "${HOME}/.ssh/known_hosts"

      - name: Clean old release directories
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p es-daskuechenhaus-crm-release-cleanup
          ssh \
            -i "${HOME}/.ssh/hetzner_key" \
            -o BatchMode=yes \
            -o ConnectTimeout=10 \
            "${TARGET_HETZNER_USER}@${TARGET_HETZNER_HOST}" \
            "KEEP_RELEASES='${KEEP_RELEASES}' APPLY_CLEANUP='${APPLY_CLEANUP}' bash -s" \
            > es-daskuechenhaus-crm-release-cleanup/cleanup.md <<'REMOTE'
          set -euo pipefail

          sudo_if_needed() {
            if [ "$(id -u)" -eq 0 ]; then
              "$@"
            else
              sudo -n "$@"
            fi
          }

          releases_dir="/opt/daskuechenhaus/dkh-crm/releases"
          current_link="/opt/daskuechenhaus/dkh-crm/current"

          printf '# es-daskuechenhaus.de CRM Release Cleanup\n\n'
          printf -- '- Keep releases: `%s`\n' "${KEEP_RELEASES}"
          printf -- '- Apply cleanup: `%s`\n' "${APPLY_CLEANUP}"
          printf -- '- Collected at: `%s`\n' "$(date -Is)"

          if [ ! -d "${releases_dir}" ]; then
            printf '\nNo releases directory found: `%s`\n' "${releases_dir}"
            exit 0
          fi

          current_target="$(readlink -f "${current_link}" 2>/dev/null || true)"
          printf -- '- Current target: `%s`\n' "${current_target:-not set}"

          printf '\n## Before\n\n'
          df -hT /
          printf '\n'
          du -sh "${releases_dir}" 2>/dev/null || true

          mapfile -t releases < <(
            find "${releases_dir}" -mindepth 1 -maxdepth 1 -type d -printf '%T@ %p\n' \
              | sort -rn \
              | awk '{ $1=""; sub(/^ /, ""); print }'
          )

          printf '\n## Releases\n\n'
          printf -- '- Total release directories: `%s`\n' "${#releases[@]}"

          declare -A keep=()
          index=0
          for release in "${releases[@]}"; do
            index=$((index + 1))
            if [ "${index}" -le "${KEEP_RELEASES}" ]; then
              keep["${release}"]=1
            fi
          done
          if [ -n "${current_target}" ]; then
            keep["${current_target}"]=1
          fi

          delete_count=0
          printf '\n## Delete candidates\n\n'
          for release in "${releases[@]}"; do
            if [ -n "${keep[${release}]:-}" ]; then
              continue
            fi
            delete_count=$((delete_count + 1))
            du -sh "${release}" 2>/dev/null || true
          done
          printf '\nDelete candidate count: `%s`\n' "${delete_count}"

          if [ "${APPLY_CLEANUP}" = "true" ]; then
            printf '\n## Applied deletions\n\n'
            for release in "${releases[@]}"; do
              if [ -n "${keep[${release}]:-}" ]; then
                continue
              fi
              case "${release}" in
                "${releases_dir}"/*)
                  printf -- '- Removing `%s`\n' "${release}"
                  sudo_if_needed rm -rf --one-file-system "${release}"
                  ;;
                *)
                  printf 'Refusing unexpected path: `%s`\n' "${release}" >&2
                  exit 1
                  ;;
              esac
            done
          else
            printf '\nDry-run only; no directories removed.\n'
          fi

          printf '\n## After\n\n'
          df -hT /
          printf '\n'
          du -sh "${releases_dir}" 2>/dev/null || true
          printf '\nRemaining release directories:\n'
          find "${releases_dir}" -mindepth 1 -maxdepth 1 -type d -printf '%TY-%Tm-%Td %TH:%TM %p\n' \
            | sort -r || true
          REMOTE

      - name: Upload cleanup evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: es-daskuechenhaus-crm-release-cleanup
          path: es-daskuechenhaus-crm-release-cleanup/cleanup.md
          if-no-files-found: error
