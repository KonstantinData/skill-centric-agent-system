name: Live Runtime Gates

on:
  workflow_dispatch:
    inputs:
      run_live_dev_e2e:
        description: Run the live dev E2E gate on the Hetzner runtime host
        required: true
        type: boolean
        default: true
      run_postgres_concurrency_smoke:
        description: Run the live Postgres concurrency smoke on the Hetzner runtime host
        required: true
        type: boolean
        default: false
      run_live_retrieval_vectorize_smoke:
        description: Run the live Control API retrieval and Vectorize smoke
        required: true
        type: boolean
        default: false
      seed_control_plane_dev:
        description: Apply migrations and seed the dev Control Plane before live gates
        required: true
        type: boolean
        default: true
      live_task_suite:
        description: Runtime E2E task suite
        required: true
        type: choice
        options:
          - generic
          - single
        default: generic

permissions:
  contents: read

concurrency:
  group: live-runtime-gates-${{ github.ref }}
  cancel-in-progress: false

jobs:
  live-runtime-gates:
    name: Live runtime gates on Hetzner
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: >-
      github.event_name == 'workflow_dispatch'
      && (inputs.run_live_dev_e2e == true
        || inputs.run_postgres_concurrency_smoke == true
        || inputs.run_live_retrieval_vectorize_smoke == true)

    env:
      CONTROL_API_TOKEN: ${{ secrets.CONTROL_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
      HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
      HETZNER_USER: ${{ secrets.HETZNER_USER }}
      SCAS_CONTROL_API_URL: https://scas-control-api-dev.still-butterfly-bbff.workers.dev
      RUN_LIVE_DEV_E2E: ${{ inputs.run_live_dev_e2e }}
      RUN_POSTGRES_CONCURRENCY_SMOKE: ${{ inputs.run_postgres_concurrency_smoke }}
      RUN_LIVE_RETRIEVAL_VECTORIZE_SMOKE: ${{ inputs.run_live_retrieval_vectorize_smoke }}
      SEED_CONTROL_PLANE_DEV: ${{ inputs.seed_control_plane_dev }}
      LIVE_TASK_SUITE: ${{ inputs.live_task_suite }}

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check required secrets are present
        shell: bash
        run: |
          set -euo pipefail

          missing=0
          for name in CONTROL_API_TOKEN HETZNER_HOST HETZNER_SSH_KEY HETZNER_USER
          do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required secret: ${name}"
              missing=1
            fi
          done

          if [ "${SEED_CONTROL_PLANE_DEV}" = "true" ]; then
            for name in CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_API_TOKEN
            do
              if [ -z "${!name:-}" ]; then
                echo "::error::Missing required secret for Control Plane seeding: ${name}"
                missing=1
              fi
            done
          fi

          exit "${missing}"

      - name: Set up Node.js
        if: env.SEED_CONTROL_PLANE_DEV == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Seed Cloudflare dev Control Plane
        if: env.SEED_CONTROL_PLANE_DEV == 'true'
        shell: bash
        run: |
          set -euo pipefail

          npm ci
          npx wrangler d1 migrations apply scas-control-dev --remote --config workers/control-api/wrangler.toml
          python scripts/cloudflare/generate_control_plane_seed.py --output examples/control-plane/dev-seed.sql
          npx wrangler d1 execute scas-control-dev --remote --file examples/control-plane/dev-seed.sql --config workers/control-api/wrangler.toml --yes

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail

          install -m 700 -d "${HOME}/.ssh"
          printf '%s\n' "${HETZNER_SSH_KEY}" | tr -d '\r' > "${HOME}/.ssh/hetzner_key"
          chmod 600 "${HOME}/.ssh/hetzner_key"

          if ! ssh-keygen -y -f "${HOME}/.ssh/hetzner_key" >/dev/null; then
            echo "::error::HETZNER_SSH_KEY must contain the complete private OpenSSH key block."
            echo "::error::Expected first line: -----BEGIN OPENSSH PRIVATE KEY-----" # pragma: allowlist secret
            exit 1
          fi

          ssh-keyscan -H "${HETZNER_HOST}" >> "${HOME}/.ssh/known_hosts"

      - name: Package repository snapshot
        shell: bash
        run: |
          set -euo pipefail
          git archive --format=tar.gz --output scas-live-runtime-gate.tar.gz HEAD

      - name: Upload snapshot to Hetzner
        shell: bash
        run: |
          set -euo pipefail

          scp \
            -i "${HOME}/.ssh/hetzner_key" \
            -o BatchMode=yes \
            -o ConnectTimeout=10 \
            scas-live-runtime-gate.tar.gz \
            "${HETZNER_USER}@${HETZNER_HOST}:/tmp/scas-live-runtime-gate-${GITHUB_RUN_ID}.tar.gz"

      - name: Run live dev E2E gate
        shell: bash
        run: |
          set -euo pipefail

          token_b64="$(printf '%s' "${CONTROL_API_TOKEN}" | base64 -w0)"

          ssh \
            -i "${HOME}/.ssh/hetzner_key" \
            -o BatchMode=yes \
            -o ConnectTimeout=10 \
            "${HETZNER_USER}@${HETZNER_HOST}" \
            "SCAS_CONTROL_API_TOKEN_B64='${token_b64}' SCAS_CONTROL_API_URL='${SCAS_CONTROL_API_URL}' GITHUB_RUN_ID='${GITHUB_RUN_ID}' RUN_LIVE_DEV_E2E='${RUN_LIVE_DEV_E2E}' RUN_POSTGRES_CONCURRENCY_SMOKE='${RUN_POSTGRES_CONCURRENCY_SMOKE}' RUN_LIVE_RETRIEVAL_VECTORIZE_SMOKE='${RUN_LIVE_RETRIEVAL_VECTORIZE_SMOKE}' LIVE_TASK_SUITE='${LIVE_TASK_SUITE}' bash -s" <<'REMOTE'
          set -euo pipefail

          sudo_if_needed() {
            if [ "$(id -u)" -eq 0 ]; then
              "$@"
            else
              sudo "$@"
            fi
          }

          as_postgres_with_runtime_env() {
            sudo \
              --preserve-env=SCAS_CONTROL_API_URL,SCAS_CONTROL_API_TOKEN,SCAS_RUNTIME_DATABASE_URL,SCAS_RUNTIME_ARTIFACT_ROOT,SCAS_REPOSITORY_ROOT \
              -u postgres \
              "$@"
          }

          archive="/tmp/scas-live-runtime-gate-${GITHUB_RUN_ID}.tar.gz"
          workdir="/tmp/scas-live-runtime-gate-${GITHUB_RUN_ID}"
          artifact_root="/opt/scas/runtime/dev/live-gates/${GITHUB_RUN_ID}"

          rm -rf "${workdir}"
          install -d -m 755 "${workdir}"
          tar -xzf "${archive}" -C "${workdir}"
          chmod -R a+rX "${workdir}"

          sudo_if_needed chgrp postgres /opt/scas/runtime
          sudo_if_needed chmod 750 /opt/scas/runtime
          sudo_if_needed install -d -o postgres -g postgres -m 750 /opt/scas/runtime/dev
          sudo_if_needed install -d -o postgres -g postgres -m 750 /opt/scas/runtime/dev/live-gates
          sudo_if_needed install -d -o postgres -g postgres -m 750 "${artifact_root}"

          if ! python3 -m venv "${workdir}/.venv"; then
            if ! command -v apt-get >/dev/null 2>&1; then
              echo "python3 venv support is missing and apt-get is unavailable." >&2
              exit 1
            fi

            sudo_if_needed env DEBIAN_FRONTEND=noninteractive apt-get update
            sudo_if_needed env DEBIAN_FRONTEND=noninteractive apt-get install -y \
              python3-venv \
              python3.12-venv
            python3 -m venv "${workdir}/.venv"
          fi

          "${workdir}/.venv/bin/python" -m pip install --upgrade pip
          "${workdir}/.venv/bin/python" -m pip install -e "${workdir}[runtime]"
          chmod -R a+rX "${workdir}/.venv"

          control_token="$(printf '%s' "${SCAS_CONTROL_API_TOKEN_B64}" | base64 -d)"

          cd "${workdir}"
          export SCAS_CONTROL_API_URL
          export SCAS_CONTROL_API_TOKEN="${control_token}"
          export SCAS_RUNTIME_DATABASE_URL="postgresql:///scas_runtime?host=/var/run/postgresql"
          export SCAS_RUNTIME_ARTIFACT_ROOT="${artifact_root}"
          export SCAS_REPOSITORY_ROOT="${workdir}"

          if [ "${RUN_LIVE_DEV_E2E}" = "true" ]; then
            as_postgres_with_runtime_env \
              "${workdir}/.venv/bin/python" scripts/runtime/live_dev_e2e.py \
                --task-suite "${LIVE_TASK_SUITE}"
          fi

          if [ "${RUN_LIVE_RETRIEVAL_VECTORIZE_SMOKE}" = "true" ]; then
            "${workdir}/.venv/bin/python" scripts/runtime/live_retrieval_vectorize_smoke.py
          fi

          if [ "${RUN_POSTGRES_CONCURRENCY_SMOKE}" = "true" ]; then
            as_postgres_with_runtime_env \
              "${workdir}/.venv/bin/python" scripts/runtime/postgres_concurrency_smoke.py \
                --events 20 \
                --profile-file examples/profiles/code-review-profile.json
          fi

          rm -f "${archive}"
          REMOTE
