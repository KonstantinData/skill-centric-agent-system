name: Live Runtime Gates

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: Target environment for live gates
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
        default: dev
      control_api_url:
        description: Optional Control API base URL override for the target environment
        required: false
        type: string
        default: ""
      run_live_dev_e2e:
        description: Run the live dev E2E gate on the Hetzner runtime host
        required: true
        type: boolean
        default: true
      run_postgres_concurrency_smoke:
        description: Run the live Postgres concurrency smoke on the Hetzner runtime host
        required: true
        type: boolean
        default: false
      run_live_retrieval_vectorize_smoke:
        description: Run the live Control API retrieval and Vectorize smoke
        required: true
        type: boolean
        default: false
      seed_control_plane_dev:
        description: Apply migrations and seed the target Control Plane before live gates
        required: true
        type: boolean
        default: true
      live_task_suite:
        description: Runtime E2E task suite
        required: true
        type: choice
        options:
          - generic
          - single
        default: generic

permissions:
  contents: read

concurrency:
  group: live-runtime-gates-${{ github.ref }}
  cancel-in-progress: false

jobs:
  live-runtime-gates:
    name: Live runtime gates on Hetzner
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: >-
      github.event_name == 'workflow_dispatch'
      && (inputs.run_live_dev_e2e == true
        || inputs.run_postgres_concurrency_smoke == true
        || inputs.run_live_retrieval_vectorize_smoke == true)

    env:
      TARGET_ENVIRONMENT: ${{ inputs.target_environment }}
      CONTROL_API_URL_OVERRIDE: ${{ inputs.control_api_url }}
      SCAS_DEV_CLOUDFLARE_ACCOUNT_ID: ${{ secrets.SCAS_DEV_CLOUDFLARE_ACCOUNT_ID }}
      SCAS_DEV_CLOUDFLARE_API_TOKEN: ${{ secrets.SCAS_DEV_CLOUDFLARE_API_TOKEN }}
      SCAS_DEV_HETZNER_HOST: ${{ secrets.SCAS_DEV_HETZNER_HOST }}
      SCAS_DEV_HETZNER_SSH_KEY: ${{ secrets.SCAS_DEV_HETZNER_SSH_KEY }}
      SCAS_DEV_HETZNER_USER: ${{ secrets.SCAS_DEV_HETZNER_USER }}
      SCAS_DEV_OPENAI_API_KEY: ${{ secrets.SCAS_DEV_OPENAI_API_KEY }}
      SCAS_DEV_CONTROL_API_TOKEN: ${{ secrets.SCAS_DEV_CONTROL_API_TOKEN }}
      SCAS_STAGING_CLOUDFLARE_ACCOUNT_ID: ${{ secrets.SCAS_STAGING_CLOUDFLARE_ACCOUNT_ID }}
      SCAS_STAGING_CLOUDFLARE_API_TOKEN: ${{ secrets.SCAS_STAGING_CLOUDFLARE_API_TOKEN }}
      SCAS_STAGING_HETZNER_HOST: ${{ secrets.SCAS_STAGING_HETZNER_HOST }}
      SCAS_STAGING_HETZNER_SSH_KEY: ${{ secrets.SCAS_STAGING_HETZNER_SSH_KEY }}
      SCAS_STAGING_HETZNER_USER: ${{ secrets.SCAS_STAGING_HETZNER_USER }}
      SCAS_STAGING_OPENAI_API_KEY: ${{ secrets.SCAS_STAGING_OPENAI_API_KEY }}
      SCAS_STAGING_CONTROL_API_TOKEN: ${{ secrets.SCAS_STAGING_CONTROL_API_TOKEN }}
      SCAS_PROD_CLOUDFLARE_ACCOUNT_ID: ${{ secrets.SCAS_PROD_CLOUDFLARE_ACCOUNT_ID }}
      SCAS_PROD_CLOUDFLARE_API_TOKEN: ${{ secrets.SCAS_PROD_CLOUDFLARE_API_TOKEN }}
      SCAS_PROD_HETZNER_HOST: ${{ secrets.SCAS_PROD_HETZNER_HOST }}
      SCAS_PROD_HETZNER_SSH_KEY: ${{ secrets.SCAS_PROD_HETZNER_SSH_KEY }}
      SCAS_PROD_HETZNER_USER: ${{ secrets.SCAS_PROD_HETZNER_USER }}
      SCAS_PROD_OPENAI_API_KEY: ${{ secrets.SCAS_PROD_OPENAI_API_KEY }}
      SCAS_PROD_CONTROL_API_TOKEN: ${{ secrets.SCAS_PROD_CONTROL_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
      HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
      HETZNER_USER: ${{ secrets.HETZNER_USER }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      CONTROL_API_TOKEN: ${{ secrets.CONTROL_API_TOKEN }}
      RUN_LIVE_DEV_E2E: ${{ inputs.run_live_dev_e2e }}
      RUN_POSTGRES_CONCURRENCY_SMOKE: ${{ inputs.run_postgres_concurrency_smoke }}
      RUN_LIVE_RETRIEVAL_VECTORIZE_SMOKE: ${{ inputs.run_live_retrieval_vectorize_smoke }}
      SEED_CONTROL_PLANE_DEV: ${{ inputs.seed_control_plane_dev }}
      LIVE_TASK_SUITE: ${{ inputs.live_task_suite }}

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check required secrets are present
        shell: bash
        run: |
          set -euo pipefail

          resolve_env_secret() {
            local target_env="$1"
            local logical_name="$2"
            local value=""
            case "${target_env}" in
              dev)
                case "${logical_name}" in
                  CLOUDFLARE_ACCOUNT_ID) value="${SCAS_DEV_CLOUDFLARE_ACCOUNT_ID:-${CLOUDFLARE_ACCOUNT_ID:-}}" ;;
                  CLOUDFLARE_API_TOKEN) value="${SCAS_DEV_CLOUDFLARE_API_TOKEN:-${CLOUDFLARE_API_TOKEN:-}}" ;;
                  HETZNER_HOST) value="${SCAS_DEV_HETZNER_HOST:-${HETZNER_HOST:-}}" ;;
                  HETZNER_SSH_KEY) value="${SCAS_DEV_HETZNER_SSH_KEY:-${HETZNER_SSH_KEY:-}}" ;;
                  HETZNER_USER) value="${SCAS_DEV_HETZNER_USER:-${HETZNER_USER:-}}" ;;
                  OPENAI_API_KEY) value="${SCAS_DEV_OPENAI_API_KEY:-${OPENAI_API_KEY:-}}" ;;
                  CONTROL_API_TOKEN) value="${SCAS_DEV_CONTROL_API_TOKEN:-${CONTROL_API_TOKEN:-}}" ;;
                  *) echo "::error::Unknown secret mapping for ${logical_name}" ; exit 1 ;;
                esac
                ;;
              staging)
                case "${logical_name}" in
                  CLOUDFLARE_ACCOUNT_ID) value="${SCAS_STAGING_CLOUDFLARE_ACCOUNT_ID:-}" ;;
                  CLOUDFLARE_API_TOKEN) value="${SCAS_STAGING_CLOUDFLARE_API_TOKEN:-}" ;;
                  HETZNER_HOST) value="${SCAS_STAGING_HETZNER_HOST:-}" ;;
                  HETZNER_SSH_KEY) value="${SCAS_STAGING_HETZNER_SSH_KEY:-}" ;;
                  HETZNER_USER) value="${SCAS_STAGING_HETZNER_USER:-}" ;;
                  OPENAI_API_KEY) value="${SCAS_STAGING_OPENAI_API_KEY:-}" ;;
                  CONTROL_API_TOKEN) value="${SCAS_STAGING_CONTROL_API_TOKEN:-}" ;;
                  *) echo "::error::Unknown secret mapping for ${logical_name}" ; exit 1 ;;
                esac
                ;;
              prod)
                case "${logical_name}" in
                  CLOUDFLARE_ACCOUNT_ID) value="${SCAS_PROD_CLOUDFLARE_ACCOUNT_ID:-}" ;;
                  CLOUDFLARE_API_TOKEN) value="${SCAS_PROD_CLOUDFLARE_API_TOKEN:-}" ;;
                  HETZNER_HOST) value="${SCAS_PROD_HETZNER_HOST:-}" ;;
                  HETZNER_SSH_KEY) value="${SCAS_PROD_HETZNER_SSH_KEY:-}" ;;
                  HETZNER_USER) value="${SCAS_PROD_HETZNER_USER:-}" ;;
                  OPENAI_API_KEY) value="${SCAS_PROD_OPENAI_API_KEY:-}" ;;
                  CONTROL_API_TOKEN) value="${SCAS_PROD_CONTROL_API_TOKEN:-}" ;;
                  *) echo "::error::Unknown secret mapping for ${logical_name}" ; exit 1 ;;
                esac
                ;;
              *)
                echo "::error::Unsupported target_environment: ${target_env}"
                exit 1
                ;;
            esac
            printf '%s' "${value}"
          }

          CONTROL_API_TOKEN="$(resolve_env_secret "${TARGET_ENVIRONMENT}" CONTROL_API_TOKEN)"
          HETZNER_HOST="$(resolve_env_secret "${TARGET_ENVIRONMENT}" HETZNER_HOST)"
          HETZNER_SSH_KEY="$(resolve_env_secret "${TARGET_ENVIRONMENT}" HETZNER_SSH_KEY)"
          HETZNER_USER="$(resolve_env_secret "${TARGET_ENVIRONMENT}" HETZNER_USER)"
          OPENAI_API_KEY="$(resolve_env_secret "${TARGET_ENVIRONMENT}" OPENAI_API_KEY)"
          CLOUDFLARE_ACCOUNT_ID="$(resolve_env_secret "${TARGET_ENVIRONMENT}" CLOUDFLARE_ACCOUNT_ID)"
          CLOUDFLARE_API_TOKEN="$(resolve_env_secret "${TARGET_ENVIRONMENT}" CLOUDFLARE_API_TOKEN)"

          if [ -n "${CONTROL_API_URL_OVERRIDE}" ]; then
            SCAS_CONTROL_API_URL="${CONTROL_API_URL_OVERRIDE}"
          elif [ "${TARGET_ENVIRONMENT}" = "dev" ]; then
            SCAS_CONTROL_API_URL="https://scas-control-api-dev.still-butterfly-bbff.workers.dev"
          else
            echo "::error::control_api_url is required for ${TARGET_ENVIRONMENT} unless a canonical environment URL is configured."
            exit 1
          fi

          {
            printf 'CONTROL_API_TOKEN=%s\n' "${CONTROL_API_TOKEN}"
            printf 'HETZNER_HOST=%s\n' "${HETZNER_HOST}"
            printf 'HETZNER_USER=%s\n' "${HETZNER_USER}"
            printf 'OPENAI_API_KEY=%s\n' "${OPENAI_API_KEY}"
            printf 'CLOUDFLARE_ACCOUNT_ID=%s\n' "${CLOUDFLARE_ACCOUNT_ID}"
            printf 'CLOUDFLARE_API_TOKEN=%s\n' "${CLOUDFLARE_API_TOKEN}"
            printf 'SCAS_CONTROL_API_URL=%s\n' "${SCAS_CONTROL_API_URL}"
            echo 'HETZNER_SSH_KEY<<__SCAS_HETZNER_SSH_KEY__'
            printf '%s\n' "${HETZNER_SSH_KEY}"
            echo '__SCAS_HETZNER_SSH_KEY__'
          } >> "${GITHUB_ENV}"

          missing=0
          for name in CONTROL_API_TOKEN HETZNER_HOST HETZNER_SSH_KEY HETZNER_USER OPENAI_API_KEY
          do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required secret for ${TARGET_ENVIRONMENT}: ${name}"
              missing=1
            fi
          done

          if [ "${SEED_CONTROL_PLANE_DEV}" = "true" ]; then
            for name in CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_API_TOKEN
            do
              if [ -z "${!name:-}" ]; then
                echo "::error::Missing required secret for ${TARGET_ENVIRONMENT} Control Plane seeding: ${name}"
                missing=1
              fi
            done
          fi

          exit "${missing}"

      - name: Set up Node.js
        if: env.SEED_CONTROL_PLANE_DEV == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Seed Cloudflare dev Control Plane
        if: env.SEED_CONTROL_PLANE_DEV == 'true'
        shell: bash
        run: |
          set -euo pipefail

          case "${TARGET_ENVIRONMENT}" in
            dev|staging|prod) ;;
            *)
              echo "::error::Unsupported target_environment: ${TARGET_ENVIRONMENT}"
              exit 1
              ;;
          esac
          control_db="scas-control-${TARGET_ENVIRONMENT}"

          npm ci
          npx wrangler d1 migrations apply "${control_db}" --remote --config workers/control-api/wrangler.toml
          python scripts/cloudflare/generate_control_plane_seed.py --output "examples/control-plane/${TARGET_ENVIRONMENT}-seed.sql"
          npx wrangler d1 execute "${control_db}" --remote --file "examples/control-plane/${TARGET_ENVIRONMENT}-seed.sql" --config workers/control-api/wrangler.toml --yes

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail

          install -m 700 -d "${HOME}/.ssh"
          printf '%s\n' "${HETZNER_SSH_KEY}" | tr -d '\r' > "${HOME}/.ssh/hetzner_key"
          chmod 600 "${HOME}/.ssh/hetzner_key"

          if ! ssh-keygen -y -f "${HOME}/.ssh/hetzner_key" >/dev/null; then
            echo "::error::HETZNER_SSH_KEY must contain the complete private OpenSSH key block."
            echo "::error::Expected first line: -----BEGIN OPENSSH PRIVATE KEY-----" # pragma: allowlist secret
            exit 1
          fi

          ssh-keyscan -H "${HETZNER_HOST}" >> "${HOME}/.ssh/known_hosts"

      - name: Package repository snapshot
        shell: bash
        run: |
          set -euo pipefail
          git archive --format=tar.gz --output scas-live-runtime-gate.tar.gz HEAD

      - name: Upload snapshot to Hetzner
        shell: bash
        run: |
          set -euo pipefail

          scp \
            -i "${HOME}/.ssh/hetzner_key" \
            -o BatchMode=yes \
            -o ConnectTimeout=10 \
            scas-live-runtime-gate.tar.gz \
            "${HETZNER_USER}@${HETZNER_HOST}:/tmp/scas-live-runtime-gate-${GITHUB_RUN_ID}.tar.gz"

      - name: Run live dev E2E gate
        shell: bash
        run: |
          set -euo pipefail

          token_b64="$(printf '%s' "${CONTROL_API_TOKEN}" | base64 -w0)"
          openai_key_b64="$(printf '%s' "${OPENAI_API_KEY}" | base64 -w0)"

          ssh \
            -i "${HOME}/.ssh/hetzner_key" \
            -o BatchMode=yes \
            -o ConnectTimeout=10 \
            "${HETZNER_USER}@${HETZNER_HOST}" \
            "TARGET_ENVIRONMENT='${TARGET_ENVIRONMENT}' SCAS_CONTROL_API_TOKEN_B64='${token_b64}' SCAS_OPENAI_API_KEY_B64='${openai_key_b64}' SCAS_CONTROL_API_URL='${SCAS_CONTROL_API_URL}' GITHUB_RUN_ID='${GITHUB_RUN_ID}' RUN_LIVE_DEV_E2E='${RUN_LIVE_DEV_E2E}' RUN_POSTGRES_CONCURRENCY_SMOKE='${RUN_POSTGRES_CONCURRENCY_SMOKE}' RUN_LIVE_RETRIEVAL_VECTORIZE_SMOKE='${RUN_LIVE_RETRIEVAL_VECTORIZE_SMOKE}' LIVE_TASK_SUITE='${LIVE_TASK_SUITE}' bash -s" <<'REMOTE'
          set -euo pipefail

          sudo_if_needed() {
            if [ "$(id -u)" -eq 0 ]; then
              "$@"
            else
              sudo "$@"
            fi
          }

          as_postgres_with_runtime_env() {
            sudo \
              --preserve-env=SCAS_CONTROL_API_URL,SCAS_CONTROL_API_TOKEN,OPENAI_API_KEY,SCAS_RUNTIME_DATABASE_URL,SCAS_RUNTIME_ARTIFACT_ROOT,SCAS_REPOSITORY_ROOT \
              -u postgres \
              "$@"
          }

          case "${TARGET_ENVIRONMENT}" in
            dev|staging|prod) ;;
            *)
              echo "Unsupported target environment: ${TARGET_ENVIRONMENT}" >&2
              exit 1
              ;;
          esac

          archive="/tmp/scas-live-runtime-gate-${GITHUB_RUN_ID}.tar.gz"
          workdir="/tmp/scas-live-runtime-gate-${GITHUB_RUN_ID}"
          artifact_root="/opt/scas/runtime/${TARGET_ENVIRONMENT}/live-gates/${GITHUB_RUN_ID}"
          runtime_database="scas_runtime"
          if [ "${TARGET_ENVIRONMENT}" != "dev" ]; then
            runtime_database="scas_runtime_${TARGET_ENVIRONMENT}"
          fi

          rm -rf "${workdir}"
          install -d -m 755 "${workdir}"
          tar -xzf "${archive}" -C "${workdir}"
          chmod -R a+rX "${workdir}"

          sudo_if_needed chgrp postgres /opt/scas/runtime
          sudo_if_needed chmod 750 /opt/scas/runtime
          sudo_if_needed install -d -o postgres -g postgres -m 750 "/opt/scas/runtime/${TARGET_ENVIRONMENT}"
          sudo_if_needed install -d -o postgres -g postgres -m 750 "/opt/scas/runtime/${TARGET_ENVIRONMENT}/live-gates"
          sudo_if_needed install -d -o postgres -g postgres -m 750 "${artifact_root}"

          if ! python3 -m venv "${workdir}/.venv"; then
            if ! command -v apt-get >/dev/null 2>&1; then
              echo "python3 venv support is missing and apt-get is unavailable." >&2
              exit 1
            fi

            sudo_if_needed env DEBIAN_FRONTEND=noninteractive apt-get update
            sudo_if_needed env DEBIAN_FRONTEND=noninteractive apt-get install -y \
              python3-venv \
              python3.12-venv
            python3 -m venv "${workdir}/.venv"
          fi

          "${workdir}/.venv/bin/python" -m pip install --upgrade pip
          "${workdir}/.venv/bin/python" -m pip install -e "${workdir}[runtime]"
          chmod -R a+rX "${workdir}/.venv"

          control_token="$(printf '%s' "${SCAS_CONTROL_API_TOKEN_B64}" | base64 -d)"
          openai_key="$(printf '%s' "${SCAS_OPENAI_API_KEY_B64}" | base64 -d)"

          cd "${workdir}"
          install -d -m 755 live-runtime-evidence
          export SCAS_CONTROL_API_URL
          export SCAS_CONTROL_API_TOKEN="${control_token}"
          export OPENAI_API_KEY="${openai_key}"
          export SCAS_RUNTIME_DATABASE_URL="postgresql:///${runtime_database}?host=/var/run/postgresql"
          export SCAS_RUNTIME_ARTIFACT_ROOT="${artifact_root}"
          export SCAS_REPOSITORY_ROOT="${workdir}"

          if [ "${RUN_LIVE_DEV_E2E}" = "true" ]; then
            as_postgres_with_runtime_env \
              "${workdir}/.venv/bin/python" scripts/runtime/live_dev_e2e.py \
                --environment "${TARGET_ENVIRONMENT}" \
                --task-suite "${LIVE_TASK_SUITE}" \
              | tee live-runtime-evidence/live-dev-e2e.json
          fi

          if [ "${RUN_LIVE_RETRIEVAL_VECTORIZE_SMOKE}" = "true" ]; then
            "${workdir}/.venv/bin/python" scripts/runtime/live_retrieval_vectorize_smoke.py
          fi

          if [ "${RUN_POSTGRES_CONCURRENCY_SMOKE}" = "true" ]; then
            as_postgres_with_runtime_env \
              "${workdir}/.venv/bin/python" scripts/runtime/postgres_concurrency_smoke.py \
                --events 20 \
                --profile-file examples/profiles/code-review-profile.json
          fi

          rm -f "${archive}"
          REMOTE

      - name: Download live handler binding evidence
        if: env.RUN_LIVE_DEV_E2E == 'true'
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p live-runtime-evidence
          scp \
            -i "${HOME}/.ssh/hetzner_key" \
            -o BatchMode=yes \
            -o ConnectTimeout=10 \
            "${HETZNER_USER}@${HETZNER_HOST}:/tmp/scas-live-runtime-gate-${GITHUB_RUN_ID}/live-runtime-evidence/live-dev-e2e.json" \
            live-runtime-evidence/live-dev-e2e.json

      - name: Upload live handler binding evidence
        if: env.RUN_LIVE_DEV_E2E == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: live-runtime-handler-binding-evidence
          path: live-runtime-evidence/live-dev-e2e.json
          if-no-files-found: error
