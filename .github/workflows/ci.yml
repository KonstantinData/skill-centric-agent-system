name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      run_infra_smoke:
        description: Run Cloudflare, OpenAI secret, and Hetzner SSH smoke checks
        required: true
        type: boolean
        default: false
      deploy_control_api_dev:
        description: Deploy the Cloudflare Control API dev Worker
        required: true
        type: boolean
        default: false
      target_environment:
        description: Target environment for manual deploy and live smoke inputs
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
        default: dev
      run_ai_gateway_live_smoke:
        description: Deploy target Worker with AI Gateway config and run a live LLM smoke
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: Contract tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12.10"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.8.9"

      - name: Install locked dependencies
        run: uv sync --frozen --extra dev --extra runtime

      - name: Check lockfile drift
        run: uv lock --check

      - name: Run contract tests
        run: uv run pytest

      - name: Run runtime efficiency baselines
        run: uv run pytest tests/test_runtime_efficiency_baselines.py

      - name: Run formal safety invariant gate
        run: |
          set -euo pipefail
          PYTHONPATH=src uv run python scripts/runtime/invariant_check.py \
            --print-json \
            --output-json ci-evidence/invariant-check.json
          python - <<'PY'
          import json
          from pathlib import Path

          report = Path("ci-evidence/invariant-check.json")
          if not report.exists():
              raise SystemExit("Missing invariant-check evidence report.")

          payload = json.loads(report.read_text(encoding="utf-8"))
          if payload.get("status") != "passed":
              raise SystemExit(f"Invariant-check status is not passed: {payload!r}")
          if int(payload.get("mismatch_count", -1)) != 0:
              raise SystemExit(
                  "Invariant-check mismatch_count must be 0, "
                  f"got {payload.get('mismatch_count')!r}"
              )
          if int(payload.get("total_cases", 0)) <= 0:
              raise SystemExit("Invariant-check executed zero replay cases.")
          PY

      - name: Run incident-locked regression gate
        run: |
          set -euo pipefail
          PYTHONPATH=src uv run python scripts/runtime/run_incident_locked_regressions.py \
            --output-json ci-evidence/incident-locked-regressions.json \
            --fail-on-failed

      - name: Run linting
        run: uv run ruff check .

      - name: Type-check runtime + composition
        run: uv run mypy

      - name: Validate skill handler coverage manifest
        run: PYTHONPATH=src uv run python scripts/runtime/skill_handler_coverage.py --check

      - name: Validate production skill instruction packs
        run: PYTHONPATH=src uv run python scripts/runtime/production_skill_instruction_packs.py --check

      - name: Validate HOOKS usage model
        run: PYTHONPATH=src uv run python scripts/runtime/validate_hooks_usage_model.py --check

      - name: Validate production recertification policy
        run: PYTHONPATH=src uv run python scripts/release/validate_production_recertification_policy.py --check

      - name: Validate transition evidence contract
        run: |
          uv run python scripts/runtime/scan_transition_signals.py --check
          uv run python scripts/runtime/validate_transition_evidence.py --check
          uv run python scripts/runtime/validate_capability_delta_transition_policy.py --check
          uv run python scripts/runtime/evaluate_intent_transition_traces.py --check
          uv run python scripts/runtime/evaluate_intent_transition_shadow_metrics.py --check
          uv run python scripts/runtime/validate_structured_evidence_extraction_decision.py --check
          uv run python scripts/runtime/validate_semantic_drift_guard.py --check

      - name: Evaluate error classification gates
        run: |
          uv run python scripts/operations/evaluate_error_classification_gates.py \
            --policy examples/operations/error-classification-gate-policy.json \
            --snapshot examples/operations/error-classification-gate-snapshot.json \
            --fail-on-failed

      - name: Validate JSON files
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          for path in Path(".").rglob("*.json"):
              json.loads(path.read_text(encoding="utf-8"))
          PY

  worker:
    name: Cloudflare Worker
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Install Worker dependencies
        run: npm ci

      - name: Generate Worker binding types
        run: npm run worker:types

      - name: Check generated Worker types are committed
        run: git diff --exit-code workers/control-api/src/worker-configuration.d.ts

      - name: Type-check Worker
        run: npm run worker:typecheck

      - name: Run Worker tests
        run: npm run worker:test

      - name: Dry-run Worker deploy
        run: npm run worker:check

  deploy-control-api:
    name: Deploy Cloudflare Control API
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: worker
    if: |
      github.event_name == 'workflow_dispatch' &&
      (inputs.deploy_control_api_dev == true || inputs.run_ai_gateway_live_smoke == true)

    env:
      TARGET_ENVIRONMENT: ${{ inputs.target_environment }}
      SCAS_DEV_CLOUDFLARE_ACCOUNT_ID: ${{ secrets.SCAS_DEV_CLOUDFLARE_ACCOUNT_ID }}
      SCAS_DEV_CLOUDFLARE_API_TOKEN: ${{ secrets.SCAS_DEV_CLOUDFLARE_API_TOKEN }}
      SCAS_DEV_CONTROL_API_TOKEN: ${{ secrets.SCAS_DEV_CONTROL_API_TOKEN }}
      SCAS_DEV_OPENAI_API_KEY: ${{ secrets.SCAS_DEV_OPENAI_API_KEY }}
      SCAS_STAGING_CLOUDFLARE_ACCOUNT_ID: ${{ secrets.SCAS_STAGING_CLOUDFLARE_ACCOUNT_ID }}
      SCAS_STAGING_CLOUDFLARE_API_TOKEN: ${{ secrets.SCAS_STAGING_CLOUDFLARE_API_TOKEN }}
      SCAS_STAGING_CONTROL_API_TOKEN: ${{ secrets.SCAS_STAGING_CONTROL_API_TOKEN }}
      SCAS_STAGING_OPENAI_API_KEY: ${{ secrets.SCAS_STAGING_OPENAI_API_KEY }}
      SCAS_PROD_CLOUDFLARE_ACCOUNT_ID: ${{ secrets.SCAS_PROD_CLOUDFLARE_ACCOUNT_ID }}
      SCAS_PROD_CLOUDFLARE_API_TOKEN: ${{ secrets.SCAS_PROD_CLOUDFLARE_API_TOKEN }}
      SCAS_PROD_CONTROL_API_TOKEN: ${{ secrets.SCAS_PROD_CONTROL_API_TOKEN }}
      SCAS_PROD_OPENAI_API_KEY: ${{ secrets.SCAS_PROD_OPENAI_API_KEY }}
      LEGACY_CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      LEGACY_CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      LEGACY_CONTROL_API_TOKEN: ${{ secrets.CONTROL_API_TOKEN }}
      LEGACY_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      AI_GATEWAY_AUTH_TOKEN: ${{ secrets.AI_GATEWAY_AUTH_TOKEN }}
      AI_GATEWAY_ID: ${{ vars.AI_GATEWAY_ID }}
      RUN_AI_GATEWAY_LIVE_SMOKE: ${{ inputs.run_ai_gateway_live_smoke }}

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Install Worker dependencies
        run: npm ci

      - name: Generate Worker binding types
        run: npm run worker:types

      - name: Type-check Worker
        run: npm run worker:typecheck

      - name: Run Worker tests
        run: npm run worker:test

      - name: Dry-run Worker deploy
        run: npm run worker:check

      - name: Prepare Worker secrets
        shell: bash
        run: |
          set -euo pipefail

          resolve_env_secret() {
            local target_env="$1"
            local logical_name="$2"
            local value=""
            case "${target_env}" in
              dev)
                case "${logical_name}" in
                  CONTROL_API_TOKEN) value="${SCAS_DEV_CONTROL_API_TOKEN:-${LEGACY_CONTROL_API_TOKEN:-}}" ;;
                  OPENAI_API_KEY) value="${SCAS_DEV_OPENAI_API_KEY:-${LEGACY_OPENAI_API_KEY:-}}" ;;
                  *) echo "::error::Unknown secret mapping for ${logical_name}" ; exit 1 ;;
                esac
                ;;
              staging)
                case "${logical_name}" in
                  CONTROL_API_TOKEN) value="${SCAS_STAGING_CONTROL_API_TOKEN:-}" ;;
                  OPENAI_API_KEY) value="${SCAS_STAGING_OPENAI_API_KEY:-}" ;;
                  *) echo "::error::Unknown secret mapping for ${logical_name}" ; exit 1 ;;
                esac
                ;;
              prod)
                case "${logical_name}" in
                  CONTROL_API_TOKEN) value="${SCAS_PROD_CONTROL_API_TOKEN:-}" ;;
                  OPENAI_API_KEY) value="${SCAS_PROD_OPENAI_API_KEY:-}" ;;
                  *) echo "::error::Unknown secret mapping for ${logical_name}" ; exit 1 ;;
                esac
                ;;
              *)
                echo "::error::Unsupported target_environment: ${target_env}"
                exit 1
                ;;
            esac
            printf '%s' "${value}"
          }

          CONTROL_API_TOKEN="$(resolve_env_secret "${TARGET_ENVIRONMENT}" CONTROL_API_TOKEN)"
          OPENAI_API_KEY="$(resolve_env_secret "${TARGET_ENVIRONMENT}" OPENAI_API_KEY)"
          export CONTROL_API_TOKEN
          export OPENAI_API_KEY

          if [ -z "${CONTROL_API_TOKEN:-}" ]; then
            echo "::error::Missing required secret for ${TARGET_ENVIRONMENT}: CONTROL_API_TOKEN"
            exit 1
          fi
          if [ -z "${OPENAI_API_KEY:-}" ]; then
            echo "::error::Missing required secret for ${TARGET_ENVIRONMENT}: OPENAI_API_KEY"
            exit 1
          fi
          if [ "${RUN_AI_GATEWAY_LIVE_SMOKE:-false}" = "true" ] && [ -z "${AI_GATEWAY_AUTH_TOKEN:-}" ]; then
            echo "::error::Missing required secret for live AI Gateway smoke: AI_GATEWAY_AUTH_TOKEN"
            echo "::error::Set it as a GitHub Actions secret; setting it only on the Worker is not enough for this deployment workflow."
            exit 1
          fi
          {
            printf 'CONTROL_API_TOKEN=%s\n' "${CONTROL_API_TOKEN}"
            printf 'OPENAI_API_KEY=%s\n' "${OPENAI_API_KEY}"
          } >> "${GITHUB_ENV}"

          echo "::notice::CLOUDFLARE_API_TOKEN must allow Worker script writes because this job deploys Worker code and secrets."
          secrets_file="${RUNNER_TEMP}/scas-control-api-${TARGET_ENVIRONMENT}-secrets.json"
          export SCAS_WORKER_SECRETS_FILE="${secrets_file}"
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          secrets = {
              "CONTROL_API_TOKEN": os.environ["CONTROL_API_TOKEN"],
              "OPENAI_API_KEY": os.environ["OPENAI_API_KEY"],
          }
          gateway_auth_token = os.environ.get("AI_GATEWAY_AUTH_TOKEN", "").strip()
          if gateway_auth_token:
              secrets["AI_GATEWAY_AUTH_TOKEN"] = gateway_auth_token
          Path(os.environ["SCAS_WORKER_SECRETS_FILE"]).write_text(
              json.dumps(secrets),
              encoding="utf-8",
          )
          PY
          echo "SCAS_WORKER_SECRETS_FILE=${secrets_file}" >> "${GITHUB_ENV}"

      - name: Configure AI Gateway vars
        shell: bash
        run: |
          set -euo pipefail

          resolve_env_secret() {
            local target_env="$1"
            local logical_name="$2"
            local value=""
            case "${target_env}" in
              dev)
                case "${logical_name}" in
                  CLOUDFLARE_ACCOUNT_ID) value="${SCAS_DEV_CLOUDFLARE_ACCOUNT_ID:-${LEGACY_CLOUDFLARE_ACCOUNT_ID:-}}" ;;
                  CLOUDFLARE_API_TOKEN) value="${SCAS_DEV_CLOUDFLARE_API_TOKEN:-${LEGACY_CLOUDFLARE_API_TOKEN:-}}" ;;
                  *) echo "::error::Unknown secret mapping for ${logical_name}" ; exit 1 ;;
                esac
                ;;
              staging)
                case "${logical_name}" in
                  CLOUDFLARE_ACCOUNT_ID) value="${SCAS_STAGING_CLOUDFLARE_ACCOUNT_ID:-}" ;;
                  CLOUDFLARE_API_TOKEN) value="${SCAS_STAGING_CLOUDFLARE_API_TOKEN:-}" ;;
                  *) echo "::error::Unknown secret mapping for ${logical_name}" ; exit 1 ;;
                esac
                ;;
              prod)
                case "${logical_name}" in
                  CLOUDFLARE_ACCOUNT_ID) value="${SCAS_PROD_CLOUDFLARE_ACCOUNT_ID:-}" ;;
                  CLOUDFLARE_API_TOKEN) value="${SCAS_PROD_CLOUDFLARE_API_TOKEN:-}" ;;
                  *) echo "::error::Unknown secret mapping for ${logical_name}" ; exit 1 ;;
                esac
                ;;
              *)
                echo "::error::Unsupported target_environment: ${target_env}"
                exit 1
                ;;
            esac
            printf '%s' "${value}"
          }

          CLOUDFLARE_ACCOUNT_ID="$(resolve_env_secret "${TARGET_ENVIRONMENT}" CLOUDFLARE_ACCOUNT_ID)"
          CLOUDFLARE_API_TOKEN="$(resolve_env_secret "${TARGET_ENVIRONMENT}" CLOUDFLARE_API_TOKEN)"
          export CLOUDFLARE_ACCOUNT_ID
          export CLOUDFLARE_API_TOKEN

          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "::error::Missing required secret for ${TARGET_ENVIRONMENT}: CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "::error::Missing required secret for ${TARGET_ENVIRONMENT}: CLOUDFLARE_API_TOKEN"
            exit 1
          fi
          {
            printf 'CLOUDFLARE_ACCOUNT_ID=%s\n' "${CLOUDFLARE_ACCOUNT_ID}"
            printf 'CLOUDFLARE_API_TOKEN=%s\n' "${CLOUDFLARE_API_TOKEN}"
          } >> "${GITHUB_ENV}"
          case "${TARGET_ENVIRONMENT}" in
            dev)
              SCAS_CONTROL_API_URL="https://scas-control-api-dev.still-butterfly-bbff.workers.dev"
              ;;
            staging)
              SCAS_CONTROL_API_URL="https://scas-control-api-staging.still-butterfly-bbff.workers.dev"
              ;;
            prod)
              SCAS_CONTROL_API_URL="https://scas-control-api-prod.still-butterfly-bbff.workers.dev"
              ;;
            *)
              echo "::error::Unsupported target_environment: ${TARGET_ENVIRONMENT}"
              exit 1
              ;;
          esac
          echo "SCAS_CONTROL_API_URL=${SCAS_CONTROL_API_URL}" >> "${GITHUB_ENV}"
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          config = Path("workers/control-api/wrangler.toml")
          text = config.read_text(encoding="utf-8")
          account_id = os.environ["CLOUDFLARE_ACCOUNT_ID"].strip()
          target_environment = os.environ["TARGET_ENVIRONMENT"].strip()
          gateway_id = (
              os.environ.get("AI_GATEWAY_ID", "").strip()
              or f"scas-ai-gateway-{target_environment}-run"
          )
          text = re.sub(
              r'AI_GATEWAY_ACCOUNT_ID = "[^"]*"',
              f'AI_GATEWAY_ACCOUNT_ID = "{account_id}"',
              text,
          )
          text = re.sub(
              r'AI_GATEWAY_ID = "[^"]*"',
              f'AI_GATEWAY_ID = "{gateway_id}"',
              text,
          )
          config.write_text(text, encoding="utf-8")
          PY

      - name: Deploy Worker
        run: |
          wrangler_env_args=()
          if [ "${TARGET_ENVIRONMENT}" != "dev" ]; then
            wrangler_env_args=(--env "${TARGET_ENVIRONMENT}")
          fi
          npx wrangler deploy \
            --config workers/control-api/wrangler.toml \
            "${wrangler_env_args[@]}" \
            --secrets-file "${SCAS_WORKER_SECRETS_FILE}"

      - name: Remove dev Worker secret file
        if: always()
        shell: bash
        run: |
          if [ -n "${SCAS_WORKER_SECRETS_FILE:-}" ]; then
            rm -f "${SCAS_WORKER_SECRETS_FILE}"
          fi

      - name: Run AI Gateway live smoke
        if: inputs.run_ai_gateway_live_smoke == true
        run: |
          export SCAS_CONTROL_API_TOKEN="${CONTROL_API_TOKEN}"
          python3 scripts/cloudflare/ai_gateway_live_smoke.py \
            --control-api-url "${SCAS_CONTROL_API_URL}"

  infrastructure-smoke:
    name: Infrastructure smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'workflow_dispatch' && inputs.run_infra_smoke == true

    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
      HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
      HETZNER_USER: ${{ secrets.HETZNER_USER }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      CONTROL_API_TOKEN: ${{ secrets.CONTROL_API_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Check required secrets are present
        shell: bash
        run: |
          set -euo pipefail

          missing=0
          for name in \
            CLOUDFLARE_ACCOUNT_ID \
            CLOUDFLARE_API_TOKEN \
            CLOUDFLARE_ZONE_ID \
            HETZNER_HOST \
            HETZNER_SSH_KEY \
            HETZNER_USER \
            OPENAI_API_KEY \
            CONTROL_API_TOKEN
          do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required secret: ${name}"
              missing=1
            fi
          done

          exit "${missing}"

      - name: Check Cloudflare API token
        shell: bash
        run: |
          set -euo pipefail

          curl --fail --silent --show-error \
            --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/user/tokens/verify" \
            >/dev/null

      - name: Check OpenAI secret is present
        shell: bash
        run: |
          set -euo pipefail
          test -n "${OPENAI_API_KEY}"

      - name: Check Hetzner SSH access
        shell: bash
        run: |
          set -euo pipefail

          install -m 700 -d "${HOME}/.ssh"
          printf '%s\n' "${HETZNER_SSH_KEY}" | tr -d '\r' > "${HOME}/.ssh/hetzner_key"
          chmod 600 "${HOME}/.ssh/hetzner_key"

          if ! ssh-keygen -y -f "${HOME}/.ssh/hetzner_key" >/dev/null; then
            echo "::error::HETZNER_SSH_KEY must contain the complete private OpenSSH key block."
            echo "::error::The configured key is missing the expected OpenSSH private key header."
            exit 1
          fi

          ssh-keyscan -H "${HETZNER_HOST}" >> "${HOME}/.ssh/known_hosts"

          ssh \
            -i "${HOME}/.ssh/hetzner_key" \
            -o BatchMode=yes \
            -o ConnectTimeout=10 \
            -o StrictHostKeyChecking=yes \
            "${HETZNER_USER}@${HETZNER_HOST}" \
            "printf scas-ssh-ok"
