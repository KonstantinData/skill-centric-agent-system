name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      run_infra_smoke:
        description: Run Cloudflare, OpenAI secret, and Hetzner SSH smoke checks
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  contracts:
    name: Contract tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run contract tests
        run: python -m pytest

      - name: Run linting
        run: python -m ruff check .

      - name: Validate JSON files
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          for path in Path(".").rglob("*.json"):
              json.loads(path.read_text(encoding="utf-8"))
          PY

  infrastructure-smoke:
    name: Infrastructure smoke test
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.run_infra_smoke == true

    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
      HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
      HETZNER_USER: ${{ secrets.HETZNER_USER }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Check required secrets are present
        shell: bash
        run: |
          set -euo pipefail

          missing=0
          for name in \
            CLOUDFLARE_ACCOUNT_ID \
            CLOUDFLARE_API_TOKEN \
            CLOUDFLARE_ZONE_ID \
            HETZNER_HOST \
            HETZNER_SSH_KEY \
            HETZNER_USER \
            OPENAI_API_KEY
          do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required secret: ${name}"
              missing=1
            fi
          done

          exit "${missing}"

      - name: Check Cloudflare API token
        shell: bash
        run: |
          set -euo pipefail

          curl --fail --silent --show-error \
            --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/user/tokens/verify" \
            >/dev/null

      - name: Check OpenAI secret is present
        shell: bash
        run: |
          set -euo pipefail
          test -n "${OPENAI_API_KEY}"

      - name: Check Hetzner SSH access
        shell: bash
        run: |
          set -euo pipefail

          install -m 700 -d "${HOME}/.ssh"
          printf '%s\n' "${HETZNER_SSH_KEY}" | tr -d '\r' > "${HOME}/.ssh/hetzner_key"
          chmod 600 "${HOME}/.ssh/hetzner_key"

          if ! ssh-keygen -y -f "${HOME}/.ssh/hetzner_key" >/dev/null; then
            echo "::error::HETZNER_SSH_KEY must contain the complete private OpenSSH key block."
            echo "::error::Expected first line: -----BEGIN OPENSSH PRIVATE KEY-----"
            exit 1
          fi

          ssh-keyscan -H "${HETZNER_HOST}" >> "${HOME}/.ssh/known_hosts"

          ssh \
            -i "${HOME}/.ssh/hetzner_key" \
            -o BatchMode=yes \
            -o ConnectTimeout=10 \
            -o StrictHostKeyChecking=yes \
            "${HETZNER_USER}@${HETZNER_HOST}" \
            "printf scas-ssh-ok"
