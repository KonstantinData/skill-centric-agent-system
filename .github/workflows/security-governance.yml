name: Security Governance

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-governance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-governance:
    name: Repository governance gates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Validate repository governance
        run: |
          python scripts/security/check_no_dotenv_files.py
          python scripts/security/validate_ruleset_config.py
          python scripts/security/validate_codeowners_coverage.py
          python scripts/security/validate_dependency_policy.py
          python scripts/security/validate_security_closure.py

  secret-scan:
    name: Secret scanning
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install secret scanning dependencies
        run: python -m pip install detect-secrets==1.5.0

      - name: Scan current tree with detect-secrets
        run: |
          detect-secrets scan . \
            --all-files \
            --exclude-files '(^|[\\/])(\.git|\.mypy_cache|\.ruff_cache|\.pytest_cache|node_modules|\.venv|venv|.*\.egg-info|security-evidence|\.scas-runtime)([\\/]|$)' \
            > .secrets.scan.json
          python scripts/security/validate_secret_scan.py detect-secrets .secrets.scan.json

      - name: Scan history with Gitleaks
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            zricethezav/gitleaks@sha256:105ac66a57b2bb8afb61a3b8a5dcc4817773d03724a7e8a515214cfe58225556 \
            detect \
              --source /repo \
              --config /repo/.gitleaks.toml \
              --report-format json \
              --report-path /repo/.gitleaks.report.json \
              --no-banner || true
          python scripts/security/validate_secret_scan.py gitleaks .gitleaks.report.json

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Audit Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,runtime]" pip-audit==2.9.0
          pip-audit

      - name: Audit Worker dependencies
        run: |
          npm ci
          npm audit --audit-level=high

  policy-as-code-gate:
    name: policy-as-code-gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Generate and validate Actions-BOM
        run: |
          python scripts/security/check_workflow_hardening.py
          python scripts/security/generate_actions_bom.py --output security-evidence/actions-bom.json
          python scripts/security/validate_actions_bom.py security-evidence/actions-bom.json
          python scripts/security/generate_sbom.py --output security-evidence/release-sbom.json
          python scripts/security/validate_sbom.py security-evidence/release-sbom.json
          python scripts/security/validate_codeowners_coverage.py \
            --output-json security-evidence/codeowners-effective-ownership.json

      - name: Upload governance evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: security-governance-evidence
          path: security-evidence/*.json
          if-no-files-found: error
