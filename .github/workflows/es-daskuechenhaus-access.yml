name: es-daskuechenhaus.de Access Configuration

on:
  workflow_dispatch:
    inputs:
      apply_changes:
        description: Apply Cloudflare Access application and policy changes
        required: true
        type: boolean
        default: false
      confirm_production:
        description: Required true when apply_changes=true
        required: true
        type: boolean
        default: false
      hostnames:
        description: Space-separated public hostnames protected by host-specific Access apps
        required: true
        type: string
        default: es-daskuechenhaus.de www.es-daskuechenhaus.de
      allowed_emails:
        description: Space-separated user emails allowed to use the CRM
        required: true
        type: string
        default: k.milonas@schober-daskuechenhaus.de
      primary_hostname:
        description: Canonical Access application hostname
        required: true
        type: string
        default: es-daskuechenhaus.de
      delete_duplicate_apps:
        description: Delete duplicate Access apps after each hostname has its own app
        required: true
        type: boolean
        default: true
      reset_user_auth_state:
        description: Revoke sessions and delete MFA authenticators for reset_user_email
        required: true
        type: boolean
        default: false
      reset_user_email:
        description: User email whose Cloudflare Access auth state should be reset
        required: false
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: es-daskuechenhaus-access
  cancel-in-progress: false

jobs:
  configure-access:
    name: Configure DKH CRM Cloudflare Access
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production
    env:
      APPLY_CHANGES: ${{ inputs.apply_changes }}
      CONFIRM_PRODUCTION: ${{ inputs.confirm_production }}
      DKH_ACCESS_HOSTNAMES: ${{ inputs.hostnames }}
      DKH_ACCESS_ALLOWED_EMAILS: ${{ inputs.allowed_emails }}
      DKH_ACCESS_PRIMARY_HOSTNAME: ${{ inputs.primary_hostname }}
      DKH_ACCESS_DELETE_DUPLICATE_APPS: ${{ inputs.delete_duplicate_apps }}
      DKH_ACCESS_RESET_USER_AUTH_STATE: ${{ inputs.reset_user_auth_state }}
      DKH_ACCESS_RESET_USER_EMAIL: ${{ inputs.reset_user_email }}
      DKH_CLOUDFLARE_ACCOUNT_ID: ${{ secrets.DKH_CLOUDFLARE_ACCOUNT_ID }}
      DKH_CLOUDFLARE_API_TOKEN: ${{ secrets.DKH_CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Configure Access application and policy
        shell: bash
        run: |
          set -euo pipefail

          if [ "${APPLY_CHANGES}" = "true" ] && [ "${CONFIRM_PRODUCTION}" != "true" ]; then
            echo "::error::confirm_production must be true when apply_changes=true."
            exit 1
          fi
          if [ -z "${DKH_CLOUDFLARE_ACCOUNT_ID}" ] || [ -z "${DKH_CLOUDFLARE_API_TOKEN}" ]; then
            echo "::error::Missing DKH Cloudflare account credentials."
            exit 1
          fi

          install -d es-daskuechenhaus-access-evidence

          python3 - <<'PY'
          import copy
          import json
          import os
          import re
          import urllib.error
          import urllib.parse
          import urllib.request
          from datetime import UTC, datetime
          from pathlib import Path

          account_id = os.environ["DKH_CLOUDFLARE_ACCOUNT_ID"]
          token = os.environ["DKH_CLOUDFLARE_API_TOKEN"]
          apply_changes = os.environ["APPLY_CHANGES"].lower() == "true"
          delete_duplicate_apps = os.environ["DKH_ACCESS_DELETE_DUPLICATE_APPS"].lower() == "true"
          reset_user_auth_state = os.environ["DKH_ACCESS_RESET_USER_AUTH_STATE"].lower() == "true"
          reset_user_email = os.environ["DKH_ACCESS_RESET_USER_EMAIL"].strip().lower()
          hostnames = [value.strip().lower() for value in os.environ["DKH_ACCESS_HOSTNAMES"].split() if value.strip()]
          allowed_emails = [value.strip().lower() for value in os.environ["DKH_ACCESS_ALLOWED_EMAILS"].split() if value.strip()]
          primary_hostname = os.environ["DKH_ACCESS_PRIMARY_HOSTNAME"].strip().lower()
          base = "https://api.cloudflare.com/client/v4"
          policy_name = "SCAS DKH CRM allowed users"
          app_name = "Das Küchenhaus CRM"
          deny_message = "Konto nicht fuer CRM freigeschaltet Bitte Team kontaktieren"
          organization_name = "Das Küchenhaus CRM"
          login_header_text = "Anmeldung zum Küchenhaus CRM"
          login_footer_text = "Zugang nur fuer freigeschaltete Benutzer"
          otp_identity_provider_name = "Das Küchenhaus CRM E-Mail-Code"
          mfa_allowed_authenticators = ["totp"]
          mfa_session_duration = "24h"

          hostname_pattern = re.compile(r"^[a-z0-9.-]+$")
          email_pattern = re.compile(r"^[^@\s]+@[^@\s]+\.[^@\s]+$")

          if not hostnames or primary_hostname not in hostnames:
              raise SystemExit("primary_hostname must be included in hostnames.")
          for hostname in hostnames:
              if not hostname_pattern.fullmatch(hostname):
                  raise SystemExit(f"Unsupported hostname value: {hostname}")
          if not allowed_emails:
              raise SystemExit("At least one allowed email is required.")
          for email in allowed_emails:
              if not email_pattern.fullmatch(email):
                  raise SystemExit(f"Unsupported email value: {email}")
          if reset_user_auth_state:
              if not reset_user_email:
                  raise SystemExit("reset_user_email is required when reset_user_auth_state=true.")
              if not email_pattern.fullmatch(reset_user_email):
                  raise SystemExit(f"Unsupported reset_user_email value: {reset_user_email}")
              if reset_user_email not in allowed_emails:
                  raise SystemExit("reset_user_email must be included in allowed_emails.")

          def cf_request(method: str, path: str, payload: dict | None = None) -> dict:
              data = None
              headers = {"Authorization": f"Bearer {token}"}
              if payload is not None:
                  data = json.dumps(payload, sort_keys=True).encode("utf-8")
                  headers["Content-Type"] = "application/json"
              request = urllib.request.Request(
                  f"{base}{path}",
                  data=data,
                  headers=headers,
                  method=method,
              )
              try:
                  with urllib.request.urlopen(request, timeout=30) as response:
                      body = json.loads(response.read().decode("utf-8"))
              except urllib.error.HTTPError as exc:
                  detail = exc.read().decode("utf-8", errors="replace")
                  raise RuntimeError(f"Cloudflare API {method} {path} failed: {detail}") from exc
              if not body.get("success", False):
                  raise RuntimeError(f"Cloudflare API {method} {path} failed: {body}")
              return body

          def cf_request_optional(method: str, path: str, payload: dict | None = None) -> tuple[dict | None, str]:
              try:
                  return cf_request(method, path, payload), ""
              except RuntimeError as exc:
                  return None, str(exc)

          def destination_uris(app: dict) -> set[str]:
              uris: set[str] = set()
              for destination in app.get("destinations") or []:
                  if destination.get("type") == "public" and destination.get("uri"):
                      uris.add(str(destination["uri"]).lower().rstrip("/"))
              for domain in app.get("self_hosted_domains") or []:
                  uris.add(str(domain).lower().rstrip("/"))
              if app.get("domain"):
                  uris.add(str(app["domain"]).lower().rstrip("/"))
              return uris

          def app_matches(app: dict) -> bool:
              return app.get("type") == "self_hosted" and bool(destination_uris(app).intersection(hostnames))

          def policy_payload(precedence: int = 1) -> dict:
              return {
                  "name": policy_name,
                  "decision": "allow",
                  "precedence": precedence,
                  "include": [
                      {"email": {"email": email}}
                      for email in allowed_emails
                  ],
                  "exclude": [],
                  "require": [],
                  "mfa_config": {
                      "allowed_authenticators": mfa_allowed_authenticators,
                      "session_duration": mfa_session_duration,
                      "mfa_disabled": False,
                  },
              }

          def policy_emails(policy: dict) -> set[str]:
              emails: set[str] = set()
              for rule in policy.get("include") or []:
                  if isinstance(rule.get("email"), dict) and rule["email"].get("email"):
                      emails.add(str(rule["email"]["email"]).lower())
                  elif rule.get("_type") == "email" and rule.get("email"):
                      emails.add(str(rule["email"]).lower())
              return emails

          def is_one_time_pin_provider(provider: dict) -> bool:
              provider_type = str(provider.get("type") or "").lower()
              provider_name = str(provider.get("name") or "").lower()
              return provider_type == "onetimepin" or "one-time pin" in provider_name or "otp" in provider_name

          def identity_provider_label(provider: dict) -> str:
              return (
                  f"{provider.get('name', 'unnamed')} "
                  f"({provider.get('type', 'unknown')}) id {provider.get('id', 'missing')}"
              )

          def app_allowed_identity_provider_labels(app: dict, provider_lookup: dict[str, dict]) -> list[str]:
              allowed_idps = app.get("allowed_idps") or []
              if not allowed_idps:
                  return ["all configured identity providers"]
              labels: list[str] = []
              for provider_id in allowed_idps:
                  provider = provider_lookup.get(str(provider_id))
                  labels.append(identity_provider_label(provider) if provider else f"unknown id {provider_id}")
              return labels

          def policy_rule_summary(policy: dict) -> str:
              fragments: list[str] = []
              for key in ("include", "require", "exclude"):
                  rules = policy.get(key) or []
                  values: list[str] = []
                  for rule in rules:
                      if isinstance(rule.get("email"), dict) and rule["email"].get("email"):
                          values.append(f"email:{str(rule['email']['email']).lower()}")
                      elif rule.get("_type") == "email" and rule.get("email"):
                          values.append(f"email:{str(rule['email']).lower()}")
                      elif isinstance(rule.get("email_domain"), dict) and rule["email_domain"].get("domain"):
                          values.append(f"domain:{str(rule['email_domain']['domain']).lower()}")
                      elif rule.get("_type") == "email_domain" and rule.get("email_domain"):
                          values.append(f"domain:{str(rule['email_domain']).lower()}")
                      elif isinstance(rule.get("group"), dict) and rule["group"].get("id"):
                          values.append(f"group:{rule['group']['id']}")
                      elif rule.get("_type"):
                          values.append(str(rule["_type"]))
                      else:
                          values.append(",".join(sorted(rule.keys())) or "unknown")
                  fragments.append(f"{key}=[{'; '.join(values) if values else 'none'}]")
              return " ".join(fragments)

          def policy_mfa_enabled(policy: dict) -> bool:
              mfa_config = policy.get("mfa_config") or {}
              allowed_authenticators = {
                  str(value)
                  for value in mfa_config.get("allowed_authenticators") or []
              }
              return (
                  mfa_config.get("mfa_disabled") is not True
                  and set(mfa_allowed_authenticators).issubset(allowed_authenticators)
                  and mfa_config.get("session_duration") == mfa_session_duration
              )

          def user_email_values(user: dict) -> set[str]:
              values: set[str] = set()
              for key in ("email", "email_address", "name", "user_email"):
                  if user.get(key) and "@" in str(user[key]):
                      values.add(str(user[key]).lower())
              for item in user.get("emails") or []:
                  if isinstance(item, dict) and item.get("value"):
                      values.add(str(item["value"]).lower())
                  elif isinstance(item, str):
                      values.add(item.lower())
              return values

          def user_matches_email(user: dict, email: str) -> bool:
              return email in user_email_values(user)

          def authenticator_id(authenticator: dict) -> str:
              for key in ("id", "uid", "uuid"):
                  if authenticator.get(key):
                      return str(authenticator[key])
              return ""

          def collect_user_authenticators(user: dict) -> list[dict]:
              authenticators: list[dict] = []
              for key in ("mfa_authenticators", "mfa_devices", "authenticators"):
                  value = user.get(key)
                  if isinstance(value, list):
                      authenticators.extend(item for item in value if isinstance(item, dict))
              return authenticators

          def access_users_matching_email(email: str) -> tuple[list[dict], list[str]]:
              warnings: list[str] = []
              users_by_id: dict[str, dict] = {}
              list_paths = [
                  f"/accounts/{account_id}/access/users?email={urllib.parse.quote(email)}&per_page=100",
                  f"/accounts/{account_id}/access/users?search={urllib.parse.quote(email)}&per_page=100",
                  f"/accounts/{account_id}/access/users?per_page=100",
              ]
              for path in list_paths:
                  body, error = cf_request_optional("GET", path)
                  if error:
                      warnings.append(error)
                      continue
                  for user in (body or {}).get("result", []):
                      if user_matches_email(user, email) and user.get("id"):
                          users_by_id[str(user["id"])] = user
              users: list[dict] = []
              for user_id, user in users_by_id.items():
                  detail, error = cf_request_optional("GET", f"/accounts/{account_id}/access/users/{user_id}")
                  if error:
                      warnings.append(error)
                      users.append(user)
                  else:
                      users.append((detail or {}).get("result", user))
              return users, warnings

          def get_user_mfa_authenticators(user: dict, warnings: list[str]) -> list[dict]:
              authenticators = collect_user_authenticators(user)
              body, error = cf_request_optional(
                  "GET",
                  f"/accounts/{account_id}/access/users/{user['id']}/mfa_authenticators",
              )
              if error:
                  warnings.append(error)
              else:
                  result = (body or {}).get("result", [])
                  if isinstance(result, list):
                      authenticators.extend(item for item in result if isinstance(item, dict))
              seen_ids: set[str] = set()
              unique_authenticators: list[dict] = []
              for authenticator in authenticators:
                  auth_id = authenticator_id(authenticator)
                  if auth_id and auth_id not in seen_ids:
                      seen_ids.add(auth_id)
                      unique_authenticators.append(authenticator)
              return unique_authenticators

          reset_status = "not-requested"
          reset_errors: list[str] = []
          reset_warnings: list[str] = []
          reset_users: list[dict] = []
          reset_user_ids: list[str] = []
          reset_user_active_sessions_before = 0
          reset_user_mfa_authenticators_before = 0
          reset_user_mfa_authenticators_deleted = 0
          reset_user_sessions_revoked = False
          reset_users_removed = 0

          def reset_access_user_auth_state() -> None:
              global reset_status
              global reset_users
              global reset_user_ids
              global reset_user_active_sessions_before
              global reset_user_mfa_authenticators_before
              global reset_user_mfa_authenticators_deleted
              global reset_user_sessions_revoked
              global reset_users_removed
              if not reset_user_auth_state:
                  return
              reset_status = "planned"
              reset_users, lookup_warnings = access_users_matching_email(reset_user_email)
              reset_warnings.extend(lookup_warnings)
              reset_user_ids = [str(user["id"]) for user in reset_users if user.get("id")]
              authenticators_by_user: dict[str, list[dict]] = {}
              for user in reset_users:
                  if not user.get("id"):
                      continue
                  sessions, error = cf_request_optional(
                      "GET",
                      f"/accounts/{account_id}/access/users/{user['id']}/active_sessions",
                  )
                  if error:
                      reset_warnings.append(error)
                  else:
                      result = (sessions or {}).get("result", [])
                      if isinstance(result, list):
                          reset_user_active_sessions_before += len(result)
                  authenticators = get_user_mfa_authenticators(user, reset_warnings)
                  authenticators_by_user[str(user["id"])] = authenticators
                  reset_user_mfa_authenticators_before += len(authenticators)
              if not apply_changes:
                  return
              body, error = cf_request_optional(
                  "POST",
                  f"/accounts/{account_id}/access/organizations/revoke_user",
                  {"email": reset_user_email},
              )
              if error:
                  reset_errors.append(error)
              else:
                  reset_user_sessions_revoked = True
              for user in reset_users:
                  user_id = str(user.get("id") or "")
                  if not user_id:
                      continue
                  for authenticator in authenticators_by_user.get(user_id, []):
                      auth_id = authenticator_id(authenticator)
                      if not auth_id:
                          continue
                      _, error = cf_request_optional(
                          "DELETE",
                          f"/accounts/{account_id}/access/users/{user_id}/mfa_authenticators/{auth_id}",
                      )
                      if error:
                          reset_errors.append(error)
                      else:
                          reset_user_mfa_authenticators_deleted += 1
                  _, error = cf_request_optional("DELETE", f"/accounts/{account_id}/access/users/{user_id}")
                  if error:
                      reset_errors.append(error)
                  else:
                      reset_users_removed += 1
              reset_status = "updated" if not reset_errors else "partial"

          def with_required_mfa_policy(policy: dict) -> dict:
              payload = copy.deepcopy(policy)
              allowed_keys = {
                  "approval_required",
                  "connection_rules",
                  "decision",
                  "exclude",
                  "include",
                  "isolation_required",
                  "name",
                  "precedence",
                  "purpose_justification_prompt",
                  "purpose_justification_required",
                  "require",
                  "session_duration",
                  "mfa_config",
              }
              payload = {
                  key: value
                  for key, value in payload.items()
                  if key in allowed_keys and value is not None
              }
              payload["mfa_config"] = {
                  "allowed_authenticators": mfa_allowed_authenticators,
                  "session_duration": mfa_session_duration,
                  "mfa_disabled": False,
              }
              return payload

          def app_name_for_hostname(hostname: str) -> str:
              return app_name if hostname == primary_hostname else f"{app_name} ({hostname})"

          def sanitize_app_for_update(app: dict | None, hostname: str) -> dict:
              allowed_keys = {
                  "type",
                  "name",
                  "domain",
                  "destinations",
                  "self_hosted_domains",
                  "session_duration",
                  "allowed_idps",
                  "app_launcher_visible",
                  "auto_redirect_to_identity",
                  "enable_binding_cookie",
                  "http_only_cookie_attribute",
                  "same_site_cookie_attribute",
                  "path_cookie_attribute",
                  "logo_url",
                  "skip_interstitial",
                  "service_auth_401_redirect",
                  "options_preflight_bypass",
                  "custom_deny_message",
                  "custom_deny_url",
                  "custom_non_identity_deny_url",
                  "cors_headers",
                  "tags",
              }
              payload = {}
              if app:
                  payload = {
                      key: copy.deepcopy(value)
                      for key, value in app.items()
                      if key in allowed_keys and value is not None
                  }
              payload["type"] = "self_hosted"
              payload["name"] = app_name_for_hostname(hostname)
              payload["domain"] = hostname
              payload["destinations"] = [{"type": "public", "uri": hostname}]
              payload["auto_redirect_to_identity"] = False
              payload["custom_deny_message"] = deny_message
              payload["http_only_cookie_attribute"] = True
              payload["path_cookie_attribute"] = False
              payload["skip_interstitial"] = False
              payload.pop("self_hosted_domains", None)
              return payload

          def sanitize_organization_for_update(organization: dict) -> dict:
              allowed_keys = {
                  "allow_authenticate_via_warp",
                  "auth_domain",
                  "auto_redirect_to_identity",
                  "custom_pages",
                  "deny_unmatched_requests",
                  "deny_unmatched_requests_exempted_zone_names",
                  "login_design",
                  "mfa_config",
                  "mfa_piv_key_requirements",
                  "mfa_required_for_all_apps",
                  "name",
                  "session_duration",
                  "user_seat_expiration_inactive_time",
                  "warp_auth_session_duration",
              }
              payload = {
                  key: copy.deepcopy(value)
                  for key, value in organization.items()
                  if key in allowed_keys and value is not None
              }
              login_design = copy.deepcopy(payload.get("login_design") or {})
              login_design["header_text"] = login_header_text
              login_design["footer_text"] = login_footer_text
              mfa_config = copy.deepcopy(payload.get("mfa_config") or {})
              allowed_authenticators = list(mfa_config.get("allowed_authenticators") or [])
              for authenticator in mfa_allowed_authenticators:
                  if authenticator not in allowed_authenticators:
                      allowed_authenticators.append(authenticator)
              mfa_config["allowed_authenticators"] = allowed_authenticators
              mfa_config["session_duration"] = mfa_session_duration
              payload["name"] = organization_name
              payload["auto_redirect_to_identity"] = False
              payload["mfa_required_for_all_apps"] = False
              payload["mfa_config"] = mfa_config
              payload["login_design"] = login_design
              return payload

          apps = cf_request("GET", f"/accounts/{account_id}/access/apps?per_page=100").get("result", [])
          matching_apps = [app for app in apps if app_matches(app)]
          if not matching_apps:
              raise SystemExit("No self-hosted Access application found for the requested hostnames.")

          organization = cf_request("GET", f"/accounts/{account_id}/access/organizations").get("result", {})
          identity_providers = cf_request("GET", f"/accounts/{account_id}/access/identity_providers?per_page=100").get("result", [])
          identity_provider_lookup = {
              str(provider.get("id")): provider
              for provider in identity_providers
              if provider.get("id")
          }
          one_time_pin_provider_ids = [
              str(provider["id"])
              for provider in identity_providers
              if provider.get("id") and is_one_time_pin_provider(provider)
          ]
          renamed_identity_providers: list[str] = []
          if apply_changes:
              for provider in identity_providers:
                  if not is_one_time_pin_provider(provider):
                      continue
                  if provider.get("name") == otp_identity_provider_name:
                      continue
                  cf_request(
                      "PUT",
                      f"/accounts/{account_id}/access/identity_providers/{provider['id']}",
                      {
                          "name": otp_identity_provider_name,
                          "type": provider["type"],
                          "config": copy.deepcopy(provider.get("config") or {}),
                      },
                  )
                  renamed_identity_providers.append(str(provider.get("name") or provider["id"]))
                  provider["name"] = otp_identity_provider_name
          def exact_app_for_hostname(candidates: list[dict], hostname: str) -> dict | None:
              for app in candidates:
                  if app.get("type") == "self_hosted" and destination_uris(app) == {hostname}:
                      return app
              return None

          def covering_app_for_hostname(
              candidates: list[dict],
              hostname: str,
              excluded_ids: set[str] | None = None,
          ) -> dict | None:
              excluded_ids = excluded_ids or set()
              for app in candidates:
                  if app.get("type") != "self_hosted" or str(app.get("id")) in excluded_ids:
                      continue
                  if hostname in destination_uris(app):
                      return app
              return None

          def select_target_apps(candidates: list[dict]) -> dict[str, dict | None]:
              target_apps: dict[str, dict | None] = {}
              primary = exact_app_for_hostname(candidates, primary_hostname) or covering_app_for_hostname(
                  candidates,
                  primary_hostname,
              )
              if primary:
                  target_apps[primary_hostname] = primary
              used_ids = {str(primary["id"])} if primary else set()
              for hostname in hostnames:
                  if hostname == primary_hostname:
                      continue
                  exact = exact_app_for_hostname(candidates, hostname)
                  if exact:
                      target_apps[hostname] = exact
                      used_ids.add(str(exact["id"]))
                      continue
                  target_apps[hostname] = covering_app_for_hostname(candidates, hostname, used_ids)
                  if target_apps[hostname]:
                      used_ids.add(str(target_apps[hostname]["id"]))
              return target_apps

          def ensure_one_time_pin_allowed(payload: dict) -> dict:
              if one_time_pin_provider_ids and payload.get("allowed_idps"):
                  allowed_idps = [str(provider_id) for provider_id in payload["allowed_idps"]]
                  for provider_id in one_time_pin_provider_ids:
                      if provider_id not in allowed_idps:
                          allowed_idps.append(provider_id)
                  payload["allowed_idps"] = allowed_idps
              return payload

          def target_app_summary(target_apps: dict[str, dict | None]) -> list[str]:
              summaries: list[str] = []
              for hostname in hostnames:
                  app = target_apps.get(hostname)
                  if app:
                      summaries.append(
                          f"{hostname}: {app.get('name', '')} / {app.get('domain', '')} / aud {app.get('aud', '')}"
                      )
                  else:
                      summaries.append(f"{hostname}: missing")
              return summaries

          def ensure_policy(app: dict, policy_changes: list[str], policy_summaries: list[str]) -> None:
              policies = cf_request("GET", f"/accounts/{account_id}/access/apps/{app['id']}/policies?per_page=200").get("result", [])
              policy_summaries.extend(
                  (
                      f"{app.get('domain', app['id'])}: {policy.get('name')} "
                      f"({policy.get('decision')}) mfa={str(policy_mfa_enabled(policy)).lower()} "
                      f"{policy_rule_summary(policy)}"
                  )
                  for policy in policies
              )
              for policy in policies:
                  if policy.get("decision") != "allow":
                      continue
                  if policy.get("name") == policy_name:
                      continue
                  if policy_mfa_enabled(policy):
                      continue
                  if apply_changes:
                      cf_request(
                          "PUT",
                          f"/accounts/{account_id}/access/apps/{app['id']}/policies/{policy['id']}",
                          with_required_mfa_policy(policy),
                      )
                  policy_changes.append(f"{app.get('domain') or app['id']}:{policy.get('name', policy['id'])}:mfa")
              target = next((policy for policy in policies if policy.get("name") == policy_name), None)
              existing_precedences = [
                  int(policy["precedence"])
                  for policy in policies
                  if str(policy.get("precedence", "")).isdigit()
              ]
              next_precedence = max(existing_precedences, default=0) + 1
              payload = policy_payload(
                  int(target["precedence"])
                  if target and str(target.get("precedence", "")).isdigit()
                  else next_precedence
              )
              if target:
                  desired_emails = set(allowed_emails)
                  if target.get("decision") != "allow" or policy_emails(target) != desired_emails or not policy_mfa_enabled(target):
                      if apply_changes:
                          cf_request("PUT", f"/accounts/{account_id}/access/apps/{app['id']}/policies/{target['id']}", payload)
                      policy_changes.append(str(app.get("domain") or app["id"]))
              else:
                  if apply_changes:
                      cf_request("POST", f"/accounts/{account_id}/access/apps/{app['id']}/policies", payload)
                  policy_changes.append(str(app.get("domain") or app["id"]))

          target_apps_before = select_target_apps(apps)
          existing_policy_summaries: list[str] = []
          changed_policies: list[str] = []
          organization_update = sanitize_organization_for_update(organization)
          organization_status = "dry-run"
          organization_error = ""
          host_app_status = "dry-run"
          host_app_error = ""
          changed_apps: list[str] = []
          deleted_duplicate_apps: list[str] = []
          deleted_duplicate_app_ids: set[str] = set()

          def delete_duplicate_app(app: dict) -> None:
              if app["id"] in deleted_duplicate_app_ids:
                  return
              cf_request("DELETE", f"/accounts/{account_id}/access/apps/{app['id']}")
              deleted_duplicate_app_ids.add(app["id"])
              deleted_duplicate_apps.append(str(app.get("domain") or app["id"]))

          if apply_changes:
              try:
                  cf_request("PUT", f"/accounts/{account_id}/access/organizations", organization_update)
                  organization_status = "updated"
              except RuntimeError as exc:
                  organization_status = "blocked"
                  organization_error = str(exc)
              try:
                  source_app = target_apps_before.get(primary_hostname) or matching_apps[0]
                  for hostname in hostnames:
                      app = target_apps_before.get(hostname)
                      if not app:
                          continue
                      payload = ensure_one_time_pin_allowed(sanitize_app_for_update(app, hostname))
                      cf_request("PUT", f"/accounts/{account_id}/access/apps/{app['id']}", payload)
                      changed_apps.append(f"{hostname}:updated")

                  refreshed_for_create = cf_request("GET", f"/accounts/{account_id}/access/apps?per_page=100").get("result", [])
                  used_target_ids: set[str] = set()
                  for hostname in hostnames:
                      app = exact_app_for_hostname(refreshed_for_create, hostname)
                      if app:
                          used_target_ids.add(str(app["id"]))
                          continue
                      app = covering_app_for_hostname(refreshed_for_create, hostname, used_target_ids)
                      if app:
                          payload = ensure_one_time_pin_allowed(sanitize_app_for_update(app, hostname))
                          cf_request("PUT", f"/accounts/{account_id}/access/apps/{app['id']}", payload)
                          changed_apps.append(f"{hostname}:split-existing")
                          used_target_ids.add(str(app["id"]))
                          refreshed_for_create = cf_request("GET", f"/accounts/{account_id}/access/apps?per_page=100").get("result", [])
                          continue
                      payload = ensure_one_time_pin_allowed(sanitize_app_for_update(source_app, hostname))
                      created = cf_request("POST", f"/accounts/{account_id}/access/apps", payload).get("result", {})
                      changed_apps.append(f"{hostname}:created")
                      if created.get("id"):
                          used_target_ids.add(str(created["id"]))
                      refreshed_for_create = cf_request("GET", f"/accounts/{account_id}/access/apps?per_page=100").get("result", [])

                  refreshed_for_cleanup = cf_request("GET", f"/accounts/{account_id}/access/apps?per_page=100").get("result", [])
                  target_apps_after_cleanup = select_target_apps(refreshed_for_cleanup)
                  target_ids = {
                      str(app["id"])
                      for app in target_apps_after_cleanup.values()
                      if app and app.get("id")
                  }
                  if delete_duplicate_apps:
                      for app in refreshed_for_cleanup:
                          uris = destination_uris(app)
                          if (
                              app.get("type") == "self_hosted"
                              and uris
                              and uris.issubset(set(hostnames))
                              and str(app.get("id")) not in target_ids
                          ):
                              delete_duplicate_app(app)

                  refreshed_for_policy = cf_request("GET", f"/accounts/{account_id}/access/apps?per_page=100").get("result", [])
                  target_apps_for_policy = select_target_apps(refreshed_for_policy)
                  missing = [hostname for hostname, app in target_apps_for_policy.items() if not app]
                  if missing:
                      raise RuntimeError(f"Missing Access applications after split: {', '.join(missing)}")
                  for hostname in hostnames:
                      ensure_policy(target_apps_for_policy[hostname], changed_policies, existing_policy_summaries)
                  host_app_status = "updated"
              except RuntimeError as exc:
                  host_app_status = "blocked"
                  host_app_error = str(exc)
          else:
              organization_status = "planned"
              host_app_status = "planned"
              for hostname, app in target_apps_before.items():
                  if app:
                      ensure_policy(app, changed_policies, existing_policy_summaries)

          reset_access_user_auth_state()

          refreshed_apps = cf_request("GET", f"/accounts/{account_id}/access/apps?per_page=100").get("result", [])
          refreshed_identity_providers = cf_request("GET", f"/accounts/{account_id}/access/identity_providers?per_page=100").get("result", [])
          refreshed_identity_provider_lookup = {
              str(provider.get("id")): provider
              for provider in refreshed_identity_providers
              if provider.get("id")
          }
          refreshed_matches = [app for app in refreshed_apps if app_matches(app)]
          target_apps_after = select_target_apps(refreshed_apps)
          target_audiences_after = [
              str(app.get("aud"))
              for app in target_apps_after.values()
              if app and app.get("aud")
          ]
          collected_at = datetime.now(UTC).isoformat()
          otp_allowed_before = (
              bool(one_time_pin_provider_ids)
              and (
                  all(
                      app
                      and (
                          not app.get("allowed_idps")
                          or bool(set(str(provider_id) for provider_id in app.get("allowed_idps", [])).intersection(one_time_pin_provider_ids))
                      )
                      for app in target_apps_before.values()
                  )
              )
          )
          otp_allowed_after = (
              bool(one_time_pin_provider_ids)
              and (
                  all(
                      app
                      and (
                          not app.get("allowed_idps")
                          or bool(set(str(provider_id) for provider_id in app.get("allowed_idps", [])).intersection(one_time_pin_provider_ids))
                      )
                      for app in target_apps_after.values()
                  )
              )
          )

          evidence = [
              "# es-daskuechenhaus.de Cloudflare Access Evidence",
              "",
              f"- Apply changes: `{str(apply_changes).lower()}`",
              f"- Primary hostname: `{primary_hostname}`",
              f"- Hostnames: `{', '.join(hostnames)}`",
              f"- Allowed emails: `{', '.join(allowed_emails)}`",
              f"- Host-specific Access apps before: `{sum(1 for app in target_apps_before.values() if app)}`",
              f"- Host-specific Access apps after: `{sum(1 for app in target_apps_after.values() if app)}`",
              f"- Matching Access apps before: `{len(matching_apps)}`",
              f"- Matching Access apps after: `{len(refreshed_matches)}`",
              f"- Access app mode: `one app per hostname`",
              f"- Application audience tags after: `{', '.join(target_audiences_after)}`",
              f"- Organization before: `{organization.get('name', '')}` / auth domain `{organization.get('auth_domain', '')}`",
              f"- Organization desired name: `{organization_name}`",
              f"- Login header text: `{login_header_text}`",
              f"- Login footer text: `{login_footer_text}`",
              f"- Independent MFA desired authenticators: `{', '.join(mfa_allowed_authenticators)}`",
              f"- Independent MFA desired session duration: `{mfa_session_duration}`",
              f"- Organization MFA required for all apps: `{str(organization_update.get('mfa_required_for_all_apps')).lower()}`",
              f"- Configured identity providers: `{len(identity_providers)}`",
              f"- OTP identity provider desired name: `{otp_identity_provider_name}`",
              f"- Renamed identity providers: `{', '.join(renamed_identity_providers) if renamed_identity_providers else 'none'}`",
              f"- One-time PIN provider present: `{str(bool(one_time_pin_provider_ids)).lower()}`",
              f"- One-time PIN allowed before: `{str(otp_allowed_before).lower()}`",
              f"- One-time PIN allowed after: `{str(otp_allowed_after).lower()}`",
              f"- Reset user auth state requested: `{str(reset_user_auth_state).lower()}`",
              f"- Reset user email: `{reset_user_email or 'none'}`",
              f"- Reset status: `{reset_status}`",
              f"- Reset matching users: `{len(reset_users)}`",
              f"- Reset matching user ids: `{', '.join(reset_user_ids) if reset_user_ids else 'none'}`",
              f"- Reset active sessions before: `{reset_user_active_sessions_before}`",
              f"- Reset MFA authenticators before: `{reset_user_mfa_authenticators_before}`",
              f"- Reset MFA authenticators deleted: `{reset_user_mfa_authenticators_deleted}`",
              f"- Reset sessions revoked: `{str(reset_user_sessions_revoked).lower()}`",
              f"- Reset users removed: `{reset_users_removed}`",
              f"- Organization branding status: `{organization_status}`",
              f"- Host app status: `{host_app_status}`",
              f"- Host app changes: `{', '.join(changed_apps) if changed_apps else 'none'}`",
              f"- Auto redirect to identity: `false`",
              f"- Path scoped Access cookie: `false`",
              f"- Policy changes needed/applied on: `{', '.join(changed_policies) if changed_policies else 'none'}`",
              f"- Deleted duplicate apps: `{', '.join(deleted_duplicate_apps) if deleted_duplicate_apps else 'none'}`",
              "- Host apps before:",
          ]
          evidence.extend(f"  - `{summary}`" for summary in target_app_summary(target_apps_before))
          evidence.extend(
              [
                  "- Host apps after:",
              ]
          )
          evidence.extend(f"  - `{summary}`" for summary in target_app_summary(target_apps_after))
          evidence.extend(
              [
              "- Identity provider summary:",
              ]
          )
          evidence.extend(f"  - `{identity_provider_label(provider)}`" for provider in refreshed_identity_providers)
          evidence.extend(
              [
                  "- Host app allowed identity providers after:",
              ]
          )
          for hostname in hostnames:
              app = target_apps_after.get(hostname)
              if app:
                  for label in app_allowed_identity_provider_labels(app, refreshed_identity_provider_lookup):
                      evidence.append(f"  - `{hostname}: {label}`")
              else:
                  evidence.append(f"  - `{hostname}: missing`")
          evidence.extend(
              [
              "- Existing policy summary:",
              ]
          )
          evidence.extend(f"  - `{summary}`" for summary in existing_policy_summaries)
          if host_app_error:
              evidence.extend(
                  [
                      "- Host app error:",
                      f"  - `{host_app_error[:1000]}`",
                  ]
              )
          if organization_error:
              evidence.extend(
                  [
                      "- Organization branding error:",
                      f"  - `{organization_error[:1000]}`",
                  ]
              )
          if reset_errors:
              evidence.extend(
                  [
                      "- Reset errors:",
                  ]
              )
              evidence.extend(f"  - `{error[:1000]}`" for error in reset_errors)
          if reset_warnings:
              evidence.extend(
                  [
                      "- Reset warnings:",
                  ]
              )
              evidence.extend(f"  - `{warning[:1000]}`" for warning in reset_warnings)
          evidence.extend(
              [
                  f"- Collected at: `{collected_at}`",
                  "",
              ]
          )

          Path("es-daskuechenhaus-access-evidence/access.md").write_text(
              "\n".join(evidence),
              encoding="utf-8",
          )
          print(json.dumps({
              "apply_changes": apply_changes,
              "matching_apps_before": len(matching_apps),
              "matching_apps_after": len(refreshed_matches),
              "changed_policies": changed_policies,
              "organization_status": organization_status,
              "host_app_status": host_app_status,
              "audiences_after": target_audiences_after,
              "deleted_duplicate_apps": deleted_duplicate_apps,
              "renamed_identity_providers": renamed_identity_providers,
              "reset_errors": reset_errors,
              "reset_matching_users": len(reset_users),
              "reset_mfa_authenticators_before": reset_user_mfa_authenticators_before,
              "reset_mfa_authenticators_deleted": reset_user_mfa_authenticators_deleted,
              "reset_sessions_revoked": reset_user_sessions_revoked,
              "reset_status": reset_status,
              "reset_user_auth_state": reset_user_auth_state,
              "reset_users_removed": reset_users_removed,
              "reset_warnings": reset_warnings,
              "one_time_pin_allowed_after": otp_allowed_after,
              "one_time_pin_allowed_before": otp_allowed_before,
              "one_time_pin_provider_present": bool(one_time_pin_provider_ids),
          }, sort_keys=True))

          if apply_changes and organization_status == "blocked":
              raise SystemExit("Access organization branding was blocked. See evidence artifact.")
          if apply_changes and host_app_status == "blocked":
              raise SystemExit("Access host application split was blocked. See evidence artifact.")
          if apply_changes and reset_user_auth_state and reset_errors:
              raise SystemExit("Access user auth reset was incomplete. See evidence artifact.")
          PY

      - name: Upload Access evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: es-daskuechenhaus-access-evidence
          path: es-daskuechenhaus-access-evidence/access.md
          if-no-files-found: error
