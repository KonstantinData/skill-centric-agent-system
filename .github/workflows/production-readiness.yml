name: Production Readiness Evidence

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: Environment this evidence applies to
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
        default: dev
      release_scope:
        description: Release scope being evaluated
        required: true
        type: string
        default: initial-productive-core
      certification_mode:
        description: Evidence-only records checks; certify requires external live evidence references
        required: true
        type: choice
        options:
          - evidence-only
          - certify
        default: evidence-only
      live_runtime_gates_run_url:
        description: URL for the matching live runtime gates run, required for certify mode
        required: false
        type: string
        default: ""
      ai_gateway_smoke_run_url:
        description: URL for the matching AI Gateway live smoke run, required for certify mode
        required: false
        type: string
        default: ""

permissions:
  actions: read
  contents: read

concurrency:
  group: production-readiness-${{ github.ref }}
  cancel-in-progress: false

jobs:
  evidence:
    name: Build production readiness evidence
    runs-on: ubuntu-latest
    timeout-minutes: 35

    env:
      TARGET_ENVIRONMENT: ${{ inputs.target_environment }}
      RELEASE_SCOPE: ${{ inputs.release_scope }}
      CERTIFICATION_MODE: ${{ inputs.certification_mode }}
      LIVE_RUNTIME_GATES_RUN_URL: ${{ inputs.live_runtime_gates_run_url }}
      AI_GATEWAY_SMOKE_RUN_URL: ${{ inputs.ai_gateway_smoke_run_url }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6

      - name: Install locked Python dependencies
        run: uv sync --frozen --extra dev --extra runtime

      - name: Check lockfile drift
        run: uv lock --check

      - name: Run repository governance gates
        run: |
          uv run python scripts/security/check_no_dotenv_files.py
          uv run python scripts/security/validate_ruleset_config.py
          uv run python scripts/security/validate_dependency_policy.py
          uv run python scripts/security/check_workflow_hardening.py
          uv run python scripts/security/generate_actions_bom.py --output security-evidence/actions-bom.json
          uv run python scripts/security/validate_actions_bom.py security-evidence/actions-bom.json
          uv run python scripts/security/generate_sbom.py --output security-evidence/release-sbom.json
          uv run python scripts/security/validate_sbom.py security-evidence/release-sbom.json

      - name: Run Python repository gates
        run: |
          uv run pytest
          uv run ruff check .
          uv run python scripts/runtime/skill_handler_coverage.py --check

      - name: Validate tracked JSON files
        run: |
          python - <<'PY'
          import json
          import subprocess
          from pathlib import Path

          tracked_json = subprocess.check_output(
              ["git", "ls-files", "*.json"],
              text=True,
          ).splitlines()
          for path in tracked_json:
              json.loads(Path(path).read_text(encoding="utf-8"))
          PY

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Install Worker dependencies
        run: npm ci

      - name: Run Worker gates
        run: |
          npm run worker:types
          git diff --exit-code workers/control-api/src/worker-configuration.d.ts
          npm run worker:typecheck
          npm run worker:test
          npm run worker:check

      - name: Validate certification inputs
        run: python scripts/release/build_production_readiness_evidence.py --validate-only

      - name: Collect external live evidence metadata
        if: ${{ inputs.certification_mode == 'certify' }}
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p production-evidence
          live_runtime_run_id="$(
            python scripts/release/build_production_readiness_evidence.py \
              --print-run-id "${LIVE_RUNTIME_GATES_RUN_URL}"
          )"
          ai_gateway_run_id="$(
            python scripts/release/build_production_readiness_evidence.py \
              --print-run-id "${AI_GATEWAY_SMOKE_RUN_URL}"
          )"

          gh run view "${live_runtime_run_id}" \
            --repo "${GITHUB_REPOSITORY}" \
            --json databaseId,workflowName,status,conclusion,headSha,url,event,displayTitle,createdAt,updatedAt \
            > production-evidence/live-runtime-gates-run.json

          gh run view "${ai_gateway_run_id}" \
            --repo "${GITHUB_REPOSITORY}" \
            --json databaseId,workflowName,status,conclusion,headSha,url,event,displayTitle,createdAt,updatedAt \
            > production-evidence/ai-gateway-smoke-run.json

          gh run download "${live_runtime_run_id}" \
            --repo "${GITHUB_REPOSITORY}" \
            --name live-runtime-handler-binding-evidence \
            --dir production-evidence/live-handler-binding

      - name: Write evidence summary
        shell: bash
        run: |
          set -euo pipefail

          args=(
            --output production-readiness-evidence.json
          )
          if [ "${CERTIFICATION_MODE}" = "certify" ]; then
            args+=(
              --live-runtime-gates-metadata production-evidence/live-runtime-gates-run.json
              --ai-gateway-smoke-metadata production-evidence/ai-gateway-smoke-run.json
              --live-handler-binding-evidence production-evidence/live-handler-binding/live-dev-e2e.json
            )
          fi

          python scripts/release/build_production_readiness_evidence.py "${args[@]}"

      - name: Upload evidence summary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: production-readiness-evidence
          path: |
            production-readiness-evidence.json
            production-evidence/*.json
            production-evidence/live-handler-binding/*.json
            security-evidence/*.json
          if-no-files-found: error
