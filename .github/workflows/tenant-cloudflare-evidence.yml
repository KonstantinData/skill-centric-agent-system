name: Tenant Cloudflare Evidence

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: Target Cloudflare environment token
        required: true
        type: choice
        options:
          - liquisto
        default: liquisto
      hostname:
        description: Tenant hostname to verify
        required: true
        type: string
        default: liquisto.cloud
      require_worker_route:
        description: Require a Cloudflare Worker route for the hostname
        required: true
        type: boolean
        default: true
      apply_dns_cutover:
        description: Create or update liquisto.cloud DNS records before verification
        required: true
        type: boolean
        default: false
      origin_ipv4:
        description: Origin IPv4 for the proxied apex A record
        required: false
        type: string
        default: ""
      confirm_hostname:
        description: Must exactly match the hostname when apply_dns_cutover=true
        required: false
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: tenant-cloudflare-evidence-${{ github.ref }}-${{ inputs.target_environment }}-${{ inputs.hostname }}
  cancel-in-progress: false

jobs:
  tenant-cloudflare-evidence:
    name: Verify tenant Cloudflare routing
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      TARGET_ENVIRONMENT: ${{ inputs.target_environment }}
      TENANT_HOSTNAME: ${{ inputs.hostname }}
      REQUIRE_WORKER_ROUTE: ${{ inputs.require_worker_route }}
      APPLY_DNS_CUTOVER: ${{ inputs.apply_dns_cutover }}
      ORIGIN_IPV4: ${{ inputs.origin_ipv4 }}
      CONFIRM_HOSTNAME: ${{ inputs.confirm_hostname }}
      LIQUISTO_CLOUDFLARE_API_TOKEN: ${{ secrets.LIQUISTO_CLOUDFLARE_API_TOKEN }}
      LIQUISTO_CLOUDFLARE_ZONE_ID: ${{ secrets.LIQUISTO_CLOUDFLARE_ZONE_ID }}

    steps:
      - name: Verify Cloudflare routing without exposing origin
        shell: bash
        run: |
          set -euo pipefail

          case "${TARGET_ENVIRONMENT}" in
            liquisto) ;;
            *) echo "::error::Unsupported target_environment: ${TARGET_ENVIRONMENT}" ; exit 1 ;;
          esac

          CLOUDFLARE_API_TOKEN="${LIQUISTO_CLOUDFLARE_API_TOKEN:-}"
          CLOUDFLARE_ZONE_ID="${LIQUISTO_CLOUDFLARE_ZONE_ID:-}"

          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "::error::Missing LIQUISTO_CLOUDFLARE_API_TOKEN."
            exit 1
          fi
          if [ -z "${CLOUDFLARE_ZONE_ID}" ]; then
            echo "::error::Missing LIQUISTO_CLOUDFLARE_ZONE_ID."
            exit 1
          fi
          if [[ ! "${TENANT_HOSTNAME}" =~ ^[A-Za-z0-9.-]+$ ]]; then
            echo "::error::hostname contains unsupported characters."
            exit 1
          fi
          if [ "${APPLY_DNS_CUTOVER}" = "true" ]; then
            if [ "${TENANT_HOSTNAME}" != "liquisto.cloud" ]; then
              echo "::error::DNS cutover is only allowed for liquisto.cloud."
              exit 1
            fi
            if [ "${CONFIRM_HOSTNAME}" != "${TENANT_HOSTNAME}" ]; then
              echo "::error::confirm_hostname must match hostname when apply_dns_cutover=true."
              exit 1
            fi
            if [[ ! "${ORIGIN_IPV4}" =~ ^([0-9]{1,3}\.){3}[0-9]{1,3}$ ]]; then
              echo "::error::origin_ipv4 must be an IPv4 address when apply_dns_cutover=true."
              exit 1
            fi
          fi

          export CLOUDFLARE_API_TOKEN
          export CLOUDFLARE_ZONE_ID

          install -d tenant-cloudflare-evidence

          python3 - <<'PY'
          import json
          import os
          import ipaddress
          import urllib.parse
          import urllib.request
          from datetime import UTC, datetime
          from pathlib import Path

          token = os.environ["CLOUDFLARE_API_TOKEN"]
          zone_id = os.environ["CLOUDFLARE_ZONE_ID"]
          hostname = os.environ["TENANT_HOSTNAME"]
          target_environment = os.environ["TARGET_ENVIRONMENT"]
          require_worker_route = os.environ["REQUIRE_WORKER_ROUTE"].lower() == "true"
          apply_dns_cutover = os.environ["APPLY_DNS_CUTOVER"].lower() == "true"
          origin_ipv4 = os.environ["ORIGIN_IPV4"].strip()
          base_url = "https://api.cloudflare.com/client/v4"

          def cloudflare(path: str, method: str = "GET", payload: dict | None = None) -> dict:
              data = None
              headers = {"Authorization": f"Bearer {token}"}
              if payload is not None:
                  data = json.dumps(payload).encode()
                  headers["Content-Type"] = "application/json"
              request = urllib.request.Request(
                  f"{base_url}{path}",
                  data=data,
                  headers=headers,
                  method=method,
              )
              with urllib.request.urlopen(request, timeout=15) as response:
                  payload = json.loads(response.read().decode())
              if not payload.get("success"):
                  raise RuntimeError(f"Cloudflare API request failed for {path}.")
              return payload

          def list_records(record_type: str, name: str) -> list[dict]:
              encoded_name = urllib.parse.quote(name, safe="")
              payload = cloudflare(
                  f"/zones/{zone_id}/dns_records?type={record_type}&name={encoded_name}&per_page=100"
              )
              return list(payload.get("result", []))

          def desired_record(record_type: str, name: str, content: str) -> dict:
              return {
                  "type": record_type,
                  "name": name,
                  "content": content,
                  "ttl": 1,
                  "proxied": True,
              }

          def upsert(record_type: str, name: str, content: str) -> str:
              records = list_records(record_type, name)
              desired = desired_record(record_type, name, content)
              if not records:
                  cloudflare(f"/zones/{zone_id}/dns_records", method="POST", payload=desired)
                  return "created"
              record_id = records[0]["id"]
              cloudflare(f"/zones/{zone_id}/dns_records/{record_id}", method="PUT", payload=desired)
              for extra in records[1:]:
                  cloudflare(f"/zones/{zone_id}/dns_records/{extra['id']}", method="DELETE")
              return "updated" if len(records) == 1 else "updated-and-deduplicated"

          dns_cutover_status = "not-applied"
          www_cutover_status = "not-applied"
          if apply_dns_cutover:
              origin_ipv4 = str(ipaddress.ip_address(origin_ipv4))
              dns_cutover_status = upsert("A", hostname, origin_ipv4)
              www_cutover_status = upsert("CNAME", f"www.{hostname}", hostname)

          dns_payload = {"result": list_records("A", hostname)}
          dns_records = dns_payload.get("result", [])
          proxied_matches = [record for record in dns_records if record.get("proxied") is True]
          if not proxied_matches:
              raise RuntimeError("No proxied Cloudflare A record found for tenant hostname.")

          ssl_payload = cloudflare(f"/zones/{zone_id}/settings/ssl")
          tls_mode = str(ssl_payload.get("result", {}).get("value", "unknown"))
          if tls_mode in {"off", "unknown"}:
              raise RuntimeError(f"Unexpected Cloudflare TLS mode: {tls_mode}")

          routes_payload = cloudflare(f"/zones/{zone_id}/workers/routes?per_page=100")
          routes = routes_payload.get("result", [])
          route_matches = [
              route
              for route in routes
              if hostname in str(route.get("pattern", ""))
              or str(route.get("pattern", "")).startswith(f"{hostname}/")
          ]
          if require_worker_route and not route_matches:
              raise RuntimeError("No Cloudflare Worker route found for tenant hostname.")

          collected_at = datetime.now(UTC).isoformat()
          evidence = "\n".join(
              [
                  "# Tenant Cloudflare Evidence",
                  "",
                  f"- Target environment: `{target_environment}`",
                  f"- Hostname: `{hostname}`",
                  f"- Proxied A record count: `{len(proxied_matches)}`",
                  f"- TLS mode: `{tls_mode}`",
                  f"- Worker route count: `{len(route_matches)}`",
                  f"- Worker route required: `{str(require_worker_route).lower()}`",
                  f"- DNS cutover applied: `{str(apply_dns_cutover).lower()}`",
                  f"- Apex A record cutover: `{dns_cutover_status}`",
                  f"- WWW CNAME cutover: `{www_cutover_status}`",
                  "- Origin record content: not printed",
                  "- Verification: `passed`",
                  f"- Collected at: `{collected_at}`",
                  "",
              ]
          )
          Path("tenant-cloudflare-evidence/evidence.md").write_text(
              evidence,
              encoding="utf-8",
          )
          print(
              json.dumps(
                  {
                      "target_environment": target_environment,
                      "hostname": hostname,
                      "proxied_a_record_count": len(proxied_matches),
                      "tls_mode": tls_mode,
                      "worker_route_count": len(route_matches),
                      "worker_route_required": require_worker_route,
                      "verification": "passed",
                  },
                  sort_keys=True,
              )
          )
          PY

      - name: Upload Cloudflare evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tenant-cloudflare-evidence-${{ inputs.target_environment }}
          path: tenant-cloudflare-evidence/evidence.md
          if-no-files-found: error
