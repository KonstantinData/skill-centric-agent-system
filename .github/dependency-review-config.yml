fail-on-severity: high
vulnerability-check: true
license-check: true
fail-on-scopes:
  - runtime
warn-only: false

allow-licenses:
  - MIT
  - Apache-2.0
  - BSD-2-Clause
  - BSD-3-Clause
  - BSD-3-Clause-Clear
  - ISC
  - Unlicense
  - CC0-1.0
  - CC-BY-4.0
  - PSF-2.0
  - Python-2.0
  - 0BSD
  - MPL-2.0

allow-dependencies-licenses:
  - pkg:pypi/jsonschema
  - pkg:pypi/pytest
  - pkg:pypi/ruff
  - pkg:pypi/typing-extensions
  - pkg:pypi/psycopg
  - pkg:pypi/psycopg-binary
  - pkg:pypi/rpds-py
  - pkg:pypi/gitdb
  - pkg:pypi/pillow
  - pkg:pypi/altair
  - pkg:pypi/cachetools
  - pkg:pypi/click
  - pkg:pypi/httptools
  - pkg:pypi/idna
  - pkg:pypi/narwhals
  - pkg:pypi/numpy
  - pkg:pypi/pandas
  - pkg:pypi/protobuf
  - pkg:pypi/pyarrow
  - pkg:pypi/python-multipart
  - pkg:pypi/starlette
  - pkg:pypi/uvicorn
  - pkg:pypi/certifi
  # Next.js locks sharp as an optional image-optimization dependency even when
  # the DKH CRM serves static assets without Next image optimization.
  - pkg:npm/sharp
  - pkg:npm/%40img/sharp-darwin-arm64
  - pkg:npm/%40img/sharp-darwin-x64
  - pkg:npm/%40img/sharp-libvips-darwin-arm64
  - pkg:npm/%40img/sharp-libvips-darwin-x64
  - pkg:npm/%40img/sharp-libvips-linux-arm
  - pkg:npm/%40img/sharp-libvips-linux-arm64
  - pkg:npm/%40img/sharp-libvips-linux-ppc64
  - pkg:npm/%40img/sharp-libvips-linux-riscv64
  - pkg:npm/%40img/sharp-libvips-linux-s390x
  - pkg:npm/%40img/sharp-libvips-linux-x64
  - pkg:npm/%40img/sharp-libvips-linuxmusl-arm64
  - pkg:npm/%40img/sharp-libvips-linuxmusl-x64
  - pkg:npm/%40img/sharp-linux-arm
  - pkg:npm/%40img/sharp-linux-arm64
  - pkg:npm/%40img/sharp-linux-ppc64
  - pkg:npm/%40img/sharp-linux-riscv64
  - pkg:npm/%40img/sharp-linux-s390x
  - pkg:npm/%40img/sharp-linux-x64
  - pkg:npm/%40img/sharp-linuxmusl-arm64
  - pkg:npm/%40img/sharp-linuxmusl-x64
  - pkg:npm/%40img/sharp-wasm32
  - pkg:npm/%40img/sharp-win32-arm64
  - pkg:npm/%40img/sharp-win32-ia32
  - pkg:npm/%40img/sharp-win32-x64
  # KHH native-readiness proof pulls Expo/React Native tooling. Keep these as
  # package-scoped exceptions because GitHub currently classifies these
  # permissive transitive licenses as composite or non-SPDX scan-code values.
  - pkg:npm/big-integer
  - pkg:npm/glob
  - pkg:npm/lru-cache
  - pkg:npm/minimatch
  - pkg:npm/minipass
  - pkg:npm/path-scurry
  - pkg:npm/sax
  - pkg:npm/unicode-match-property-value-ecmascript
  - pkg:npm/unicode-property-aliases-ecmascript
  - pkg:npm/xmlbuilder
  # Private, repository-local workspace packages are covered by the repository
  # license notice and are not external third-party dependencies.
  - pkg:npm/khh-mobile-proof
  - pkg:npm/expo
  - pkg:npm/%40scas/tenant-workbench-client
  - pkg:npm/%40scas/tenant-workbench-domain
  - pkg:npm/%40scas/tenant-workbench-ui
