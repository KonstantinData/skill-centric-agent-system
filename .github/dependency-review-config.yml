fail-on-severity: high
vulnerability-check: true
license-check: true
fail-on-scopes:
  - runtime
warn-only: false

allow-licenses:
  - MIT
  - Apache-2.0
  - BSD-2-Clause
  - BSD-3-Clause
  - BSD-3-Clause-Clear
  - ISC
  - Unlicense
  - CC0-1.0
  - CC-BY-4.0
  - PSF-2.0
  - Python-2.0
  - 0BSD
  - MPL-2.0

allow-dependencies-licenses:
  - pkg:pypi/jsonschema
  - pkg:pypi/pytest
  - pkg:pypi/ruff
  - pkg:pypi/typing-extensions
  - pkg:pypi/psycopg
  - pkg:pypi/psycopg-binary
  - pkg:pypi/rpds-py
  - pkg:pypi/gitdb
  - pkg:pypi/pillow
  - pkg:pypi/altair
  - pkg:pypi/cachetools
  - pkg:pypi/click
  - pkg:pypi/httptools
  - pkg:pypi/idna
  - pkg:pypi/narwhals
  - pkg:pypi/numpy
  - pkg:pypi/pandas
  - pkg:pypi/protobuf
  - pkg:pypi/pyarrow
  - pkg:pypi/python-multipart
  - pkg:pypi/starlette
  - pkg:pypi/streamlit
  - pkg:pypi/uvicorn
  - pkg:pypi/certifi
